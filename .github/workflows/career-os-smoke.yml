name: Career OS Smoke Test

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/career-os-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-save --silent jsdom@24
      - name: Render Career OS
        run: |
          cat > /tmp/smoke.mjs <<'EOF'
          import { JSDOM, VirtualConsole } from 'jsdom';
          import path from 'node:path';
          import { pathToFileURL } from 'node:url';
          import fs from 'node:fs';

          const errors = [];
          const virtualConsole = new VirtualConsole();
          virtualConsole.on('jsdomError', error => errors.push(String(error)));
          virtualConsole.on('error', error => errors.push(String(error)));
          let checks = {};
          try {
            const file = path.resolve('career-roadmap/index.html');
            const dom = await JSDOM.fromFile(file, {
              url: pathToFileURL(file).href,
              resources: 'usable',
              runScripts: 'dangerously',
              pretendToBeVisual: true,
              virtualConsole,
              beforeParse(window) {
                window.scrollTo = () => {};
                window.structuredClone ||= value => JSON.parse(JSON.stringify(value));
                window.URL.createObjectURL ||= () => 'blob:test';
                window.URL.revokeObjectURL ||= () => {};
              }
            });
            await new Promise(resolve => dom.window.document.readyState === 'complete' ? resolve() : dom.window.addEventListener('load', resolve, { once: true }));
            await new Promise(resolve => setTimeout(resolve, 3000));
            const d = dom.window.document;
            checks = {
              title: d.title.includes('Career OS V2.3'),
              today: d.querySelector('#todayStatusRow')?.children.length === 3,
              actions: d.querySelector('#todayActionList')?.children.length > 0,
              weeks: d.querySelectorAll('#weekTabs button').length === 16,
              cycles: d.querySelectorAll('#curriculumMap .curriculum-cycle').length === 4,
              curriculum: d.documentElement.dataset.curriculum === 'soc-verification-16w-v1',
              abilities: d.querySelectorAll('#abilityGrid .ability').length === 7,
              views: d.querySelectorAll('.nav button').length === 4,
              quickModal: Boolean(d.querySelector('#quickModal')),
              toolsModal: Boolean(d.querySelector('#toolsModal'))
            };
            dom.window.close();
          } catch (error) {
            errors.push(error?.stack || String(error));
          }
          fs.writeFileSync('/tmp/smoke-result.json', JSON.stringify({ checks, errors }, null, 2));
          EOF
          node /tmp/smoke.mjs
      - name: Check no script errors
        run: node -e "const r=require('/tmp/smoke-result.json'); if(r.errors.length){console.error(r.errors.join('\n'));process.exit(1)}"
      - name: Check page title
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.title)process.exit(1)"
      - name: Check today status
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.today)process.exit(1)"
      - name: Check today actions
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.actions)process.exit(1)"
      - name: Check 16 weeks
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.weeks)process.exit(1)"
      - name: Check 4 cycles
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.cycles)process.exit(1)"
      - name: Check curriculum marker
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.curriculum)process.exit(1)"
      - name: Check 7 abilities
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.abilities)process.exit(1)"
      - name: Check 4 views
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.views)process.exit(1)"
      - name: Check quick modal
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.quickModal)process.exit(1)"
      - name: Check tools modal
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.toolsModal)process.exit(1)"
