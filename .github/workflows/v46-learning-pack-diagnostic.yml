name: V4.6 Learning Pack Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/v46-learning-pack-diagnostic.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8000 --directory . >/tmp/http.log 2>&1 &
          sleep 2
      - run: |
          cat > check.mjs <<'EOF'
          import {chromium} from 'playwright';
          const b=await chromium.launch({headless:true});const p=await b.newPage();const e=[];
          p.on('pageerror',x=>e.push(x.message));await p.goto('http://127.0.0.1:8000/career-roadmap/index.html');await p.waitForTimeout(2500);
          const c={title:(await p.title()).includes('V4.6'),base:await p.evaluate(()=>Object.fromEntries(S.abilities.map(x=>[x.id,x.level]))),cand:await p.evaluate(()=>Object.fromEntries(S.abilityCandidates.map(x=>[x.id,x.candidateLevel]))),packs:await p.evaluate(()=>Object.keys(LEARNING_PACKS_V46).join(','))};
          await p.click('[data-view="growth"]');c.cards=await p.locator('#ability-candidates-v46 details').count();c.modes=await p.locator('[data-pack-mode]').count();c.materials=await p.locator('.material-list-v46 a').count();c.templates=await p.locator('[data-copy-template]').count();c.rubrics=await p.locator('.rubric-v46>div:not(.eyebrow)').count();
          await p.click('[data-pack-mode="high"]');await p.locator('[data-pack-check="materials"]').check();await p.locator('#packSelfScoreV46').selectOption('3');await p.locator('#actualHoursV46').fill('2.5');await p.locator('#oralScoreV46').fill('3.5');await p.locator('#transferV46').fill('1');await p.click('#saveCalibrationV46');
          c.saved=await p.evaluate(()=>({mode:S.learningPackV46.modeByWeek.w1,check:S.learningPackV46.checklist.w1.materials,score:S.learningPackV46.selfScore.w1,hours:S.learningPackV46.calibration.w1.actualHours}));
          for(const [i,t] of [[1,'PMON-Lite'],[2,'FDD快速跌落'],[3,'随机时钟切换']]){await p.locator('#weekTabs button').nth(i).click();await p.waitForTimeout(120);c['w'+(i+1)]=(await p.locator('#learningPackBodyV46').innerText()).includes(t)}
          await b.close();
          const ok=!e.length&&c.title&&c.base.verification===3&&c.base.debug===3&&c.base.lowpower===1&&c.cand.verification===4&&c.cand.debug===4&&c.cand.lowpower===2&&c.packs==='w1,w2,w3,w4'&&c.cards===7&&c.modes===3&&c.materials===3&&c.templates===4&&c.rubrics===5&&c.saved.mode==='high'&&c.saved.check&&c.saved.score==='3'&&c.saved.hours===2.5&&c.w2&&c.w3&&c.w4;
          console.log(JSON.stringify({ok,c,e},null,2));if(!ok)process.exit(1);
          EOF
          node check.mjs
