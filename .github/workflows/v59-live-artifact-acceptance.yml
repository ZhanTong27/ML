name: Career OS V5.9.4 Growth Integration Acceptance

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/v59-live-artifact-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  growth-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build single-file Career OS
        run: python3 career-roadmap/build_single_file.py

      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit

      - name: Start local site
        run: |
          python3 -m http.server 8080 > /tmp/career-os-server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:8080/career-roadmap/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/career-os-server.log
          exit 1

      - name: Validate CRG and Weekly Review in Chromium and WebKit
        run: |
          mkdir -p /tmp/v594-acceptance
          cat > v594-check.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';

          const SITE='http://127.0.0.1:8080/career-roadmap/';
          const result={site:SITE,passed:false,runs:[]};

          async function run(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const item={name,errors:[]};
            page.on('pageerror',e=>item.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')item.errors.push(`console: ${m.text()}`)});
            try{
              const response=await page.goto(`${SITE}?v594=${Date.now()}`,{waitUntil:'load',timeout:45000});
              item.httpStatus=response?.status()||0;
              await page.waitForFunction(()=>window.CAREER_OS_V59?.complete===true,null,{timeout:30000});
              await page.waitForFunction(()=>window.CAREER_OS_V594?.complete===true,null,{timeout:30000});
              await page.click('[data-view="growth"]');
              await page.click('[data-v58-nav="topics"]');
              await page.waitForSelector('#crg-track-card-v594',{state:'visible',timeout:15000});
              await page.click('#toggleCrgTrackV594');
              await page.waitForSelector('#crg-track-detail-v594',{state:'visible',timeout:15000});
              await page.locator('#crg-track-card-v594').scrollIntoViewIfNeeded();
              await page.screenshot({path:`/tmp/v594-acceptance/${name}-tracks.png`,fullPage:false});
              await page.locator('#crg-track-detail-v594').scrollIntoViewIfNeeded();
              await page.screenshot({path:`/tmp/v594-acceptance/${name}-crg-detail.png`,fullPage:false});

              const crg=await page.evaluate(()=>{
                const card=document.querySelector('#crg-track-card-v594');
                const detail=document.querySelector('#crg-track-detail-v594');
                return{
                  marker:window.CRG_TRACK_V593?.marker||'',
                  integration:window.CAREER_OS_V594||null,
                  packs:window.CRG_TRACK_V593?.packs?.length||0,
                  domains:window.CRG_TRACK_V593?.knowledgeDomains?.length||0,
                  verificationLayers:window.CRG_TRACK_V593?.verificationLayers?.length||0,
                  automationDirections:window.CRG_TRACK_V593?.automationDirections?.length||0,
                  state:S.specializationTracks?.crg?.status||'',
                  cardVisible:Boolean(card&&card.offsetParent!==null),
                  detailVisible:Boolean(detail&&detail.offsetParent!==null),
                  packCards:detail?.querySelectorAll('.crg-pack-v594').length||0,
                  domainCards:detail?.querySelectorAll('.crg-domain-grid-v594>article').length||0,
                  boundary:Boolean(detail?.innerText.includes('功能CRG与物理Clock Tree边界')),
                  personalBoundary:Boolean(card?.innerText.includes('不自动推进Track')),
                  overflow:Math.max(card?.scrollWidth-card?.clientWidth||0,detail?.scrollWidth-detail?.clientWidth||0)
                }
              });

              await page.click('[data-v58-nav="archive"]');
              await page.waitForSelector('#weekly-review-v594',{state:'visible',timeout:15000});
              await page.locator('#weekly-review-v594').scrollIntoViewIfNeeded();
              await page.screenshot({path:`/tmp/v594-acceptance/${name}-weekly.png`,fullPage:false});
              const weekly=await page.evaluate(()=>{
                const node=document.querySelector('#weekly-review-v594');
                return{
                  marker:window.CAREER_OS_V592_WEEKLY_REVIEW?.marker||'',
                  visible:Boolean(node&&node.offsetParent!==null),
                  diagnosisRows:node?.querySelectorAll('.weekly-diagnoses-v594>article').length||0,
                  interventions:window.CAREER_OS_V592_WEEKLY_REVIEW?.interventions?.length||0,
                  theme:Boolean(node?.innerText.includes('确认机制、接口合同与签核边界')),
                  overflow:node?node.scrollWidth-node.clientWidth:999
                }
              });
              const pageOverflow=await page.evaluate(()=>document.documentElement.scrollWidth-document.documentElement.clientWidth);
              item.check={crg,weekly,pageOverflow};
              item.passed=item.httpStatus===200&&item.errors.length===0&&crg.marker==='CAREER_OS_V593_CRG_TRACK'&&crg.integration?.marker==='CAREER_OS_V594_GROWTH_INTEGRATION'&&crg.integration?.complete===true&&crg.packs===3&&crg.domains===7&&crg.verificationLayers===8&&crg.automationDirections===6&&crg.state==='not_started'&&crg.cardVisible&&crg.detailVisible&&crg.packCards===3&&crg.domainCards===7&&crg.boundary&&crg.personalBoundary&&crg.overflow<=1&&weekly.marker==='CAREER_OS_V592_WEEKLY_REVIEW'&&weekly.visible&&weekly.diagnosisRows===6&&weekly.interventions===3&&weekly.theme&&weekly.overflow<=1&&pageOverflow<=1;
            }catch(error){item.errors.push(error?.stack||String(error));item.passed=false}
            result.runs.push(item);
            await browser.close();
          }

          await run(chromium,'Career_OS_V5.9.4_desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await run(webkit,'Career_OS_V5.9.4_iPhone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/v594-acceptance/result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          if(!result.passed)process.exit(1);
          EOF
          node v594-check.mjs

      - name: Upload diagnostics and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-os-v594-growth-integration
          path: /tmp/v594-acceptance