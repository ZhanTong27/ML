name: Career OS V5.5.2 WebKit Daily Smoke

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/bundle-career-os.yml'
      - '.github/workflows/v552-webkit-daily-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  webkit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Build branch single-file page
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          root=Path('career-roadmap')
          html=(root/'index.template.html').read_text(encoding='utf-8')
          css=(root/'style.css').read_text(encoding='utf-8')
          html=html.replace('<link rel="stylesheet" href="style.css">','<style>\n'+css+'\n</style>',1)
          sources=['legacy-data-v22.js','curriculum/base.js','curriculum/cycle1.js','curriculum/cycle2.js','curriculum/cycle3.js','curriculum/cycle4.js','app.js','curriculum/patch.js','curriculum/finalize.js']
          markers='\n'.join('<script src="'+src+'"></script>' for src in sources)
          blocks=[]
          bootstrap='curriculum/v50-storage-bootstrap.js'
          ordered=[bootstrap]+sources+['curriculum/manual-v31.js','curriculum/v32.js','curriculum/resume-v33.js','curriculum/resume-portfolio-v34.js','curriculum/daily-20260713.js','curriculum/daily-20260714-core.js','curriculum/daily-20260714-analysis.js','curriculum/daily-20260714.js','curriculum/daily-20260715-record.js','curriculum/daily-20260715-analysis.js','curriculum/daily-20260715.js','curriculum/v40-career-model.js','curriculum/v40-reviews.js','curriculum/v41-explorer.js','curriculum/v42-demo.js','curriculum/v43-dji-assets.js','curriculum/v44-finance-simple.js','curriculum/v45-personalized-learning.js','curriculum/v46-pack-w1.js','curriculum/v46-pack-w2.js','curriculum/v46-pack-w3.js','curriculum/v46-pack-w4.js','curriculum/v46-learning-pack-ui.js','curriculum/v47-ai-native-overlay.js','curriculum/v48-reality-responsive.js','curriculum/v49-identity-education.js','curriculum/v50-profile-source.js','curriculum/v50-frontier-methods.js','curriculum/v50-frontier-labs.js','curriculum/v50-frontier-ui.js','curriculum/v50-asset-system.js','curriculum/v50-simplicity-core.js','curriculum/v50-frontier-kickoff.js','curriculum/v50-finalize.js','curriculum/v51-daily-closure-loop.js','curriculum/v51-daily-closure-fixes.js','curriculum/v52-learning-seeds-a.js','curriculum/v52-learning-seeds-b.js','curriculum/v52-problem-learning-ui.js','curriculum/v52-problem-learning-core.js','curriculum/v53-daily-history-demo.js','curriculum/v53-demo-fix.js','curriculum/v54-learning-seeds-0715-a.js','curriculum/v54-learning-seeds-0715-b.js','curriculum/v54-finalize.js','curriculum/v55-ams-frontier-data.js','curriculum/v55-source-corrections.js','curriculum/v55-ams-frontier-ui.js','curriculum/v55-frontier-integration-fix.js','curriculum/v55-finalize.js','curriculum/v551-daily-integrity-hotfix.js','curriculum/v552-safari-daily-recovery.js']
          for src in ordered:
              code=(root/src).read_text(encoding='utf-8')
              code=re.sub(r'</script',r'<\\/script',code,flags=re.I)
              blocks.append('<script data-source="'+src+'">\n'+code+'\n</script>')
          html=html.replace(markers,'\n'.join(blocks[:len(sources)+1]),1)
          html=html.replace('</body>','\n'.join(blocks[len(sources)+1:])+'\n</body>',1)
          (root/'index.webkit.html').write_text(html,encoding='utf-8')
          PY
      - name: Install WebKit runtime
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps webkit
      - name: Run iPhone-sized WebKit checks
        continue-on-error: true
        run: |
          python3 -m http.server 8000 --directory . >/tmp/career-webkit-http.log 2>&1 &
          cat > webkit-smoke.mjs <<'EOF'
          import { webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const result={passed:false,checks:{},errors:[]};
          let browser;
          try{
            browser=await webkit.launch({headless:true});
            const context=await browser.newContext({...devices['iPhone 15 Pro'],locale:'zh-CN'});
            const page=await context.newPage();
            page.on('pageerror',e=>result.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')result.errors.push(`console: ${m.text()}`)});
            const url='http://127.0.0.1:8000/career-roadmap/index.webkit.html';
            await page.goto(url,{waitUntil:'load'});
            await page.waitForFunction(()=>Boolean(window.CAREER_OS_V552),null,{timeout:20000});
            await page.evaluate(()=>{
              const key='zhantong-career-os-v5';
              const state=JSON.parse(localStorage.getItem(key));
              state.selectedDate='2026-07-15';
              state.calendarMonth='2026-07';
              state.dailyLogs=[
                {date:'2026-07-13',summary:'cached empty 13',work:[]},
                {date:'2026-07-14',summary:'cached empty 14',workItems:[]},
                {date:'2026-07-15',summary:'cached empty 15',work:[]}
              ];
              state.dailyIntegrityV551={installedAt:'old-cache'};
              state.dailyRecoveryV552={version:'old-cache',complete:false};
              localStorage.setItem(key,JSON.stringify(state));
            });
            result.errors=[];
            await page.reload({waitUntil:'load'});
            await page.waitForFunction(()=>window.CAREER_OS_V552&&window.CAREER_OS_V552.complete===true,null,{timeout:20000});
            await page.waitForTimeout(2500);
            Object.assign(result.checks,await page.evaluate(()=>({
              title:document.title,
              recovery:window.CAREER_OS_V552,
              selectedDate:typeof S!=='undefined'?S.selectedDate:null,
              todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
              recentText:document.querySelector('#recentRecords')?.innerText||'',
              historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate),
              overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth,
              backup:Boolean(localStorage.getItem('zhantong-career-os-v5-pre-v552-backup'))
            })));
            await page.evaluate(()=>{const grid=document.querySelector('#calendarGrid');const details=grid&&grid.closest('details');if(details)details.open=true;grid&&grid.scrollIntoView({block:'center'})});
            result.checks.details={};
            for(const date of ['2026-07-13','2026-07-14','2026-07-15']){
              await page.locator(`#calendarGrid [data-date="${date}"]`).click();
              const text=await page.locator('#calendarDayDetail').innerText();
              result.checks.details[date]=text.slice(0,260);
              if(text.includes('当天没有工作记录'))result.errors.push(`${date} empty in WebKit`)
            }
            const counts=result.checks.recovery?.counts||{};
            result.passed=result.errors.length===0&&result.checks.title.includes('V5.5.2')&&counts['2026-07-13']===3&&counts['2026-07-14']===4&&counts['2026-07-15']===4&&result.checks.selectedDate==='2026-07-15'&&result.checks.todayStatus==='已记录'&&['2026-07-13','2026-07-14','2026-07-15'].every(x=>result.checks.historyDates.includes(x))&&result.checks.overflow<=1&&result.checks.backup;
          }catch(e){result.errors.push(e?.stack||String(e))}finally{await browser?.close()}
          fs.writeFileSync('/tmp/v552-webkit-result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node webkit-smoke.mjs
      - name: Upload WebKit diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v552-webkit-daily-result
          path: /tmp/v552-webkit-result.json
      - name: Publish diagnostic
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS V5.5.2 WebKit Daily diagnostic'; echo '```json'; cat /tmp/v552-webkit-result.json; echo '```'; } >/tmp/v552-webkit-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/v552-webkit-comment.md
      - name: Enforce WebKit checks
        run: node -e "const r=require('/tmp/v552-webkit-result.json');if(!r.passed)process.exit(1)"
