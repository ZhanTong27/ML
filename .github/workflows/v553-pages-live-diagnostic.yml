name: Career OS GitHub Pages Live Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/v553-pages-live-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  live-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Test official Pages URL
        continue-on-error: true
        run: |
          cat > pages-live.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const site='https://zhantong27.github.io/ML/';
          const result={site,runs:[]};
          async function inspect(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const run={browser:name,errors:[]};
            page.on('pageerror',e=>run.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')run.errors.push(`console: ${m.text()}`)});
            try{
              let response;
              for(let attempt=0;attempt<12;attempt++){
                response=await page.goto(`${site}?live=${Date.now()}-${attempt}`,{waitUntil:'load',timeout:45000});
                await page.waitForTimeout(2500);
                if(response?.status()===200&&(await page.title()).includes('V5.5.2'))break;
                await page.waitForTimeout(10000);
              }
              run.status=response?.status()||0;
              run.finalUrl=page.url();
              run.contentType=response?.headers()?.['content-type']||'';
              run.fresh=await page.evaluate(()=>({title:document.title,bodyStart:document.body.innerText.slice(0,500),v552:window.CAREER_OS_V552||null}));
              if(run.status===200&&run.fresh.title.includes('V5.5.2')){
                await page.evaluate(()=>{
                  const key='zhantong-career-os-v5';
                  const current=JSON.parse(localStorage.getItem(key)||'{}');
                  current.selectedDate='2026-07-15';
                  current.calendarMonth='2026-07';
                  current.dailyLogs=[
                    {date:'2026-07-13',summary:'live empty 13',work:[]},
                    {date:'2026-07-14',summary:'live empty 14',workItems:[]},
                    {date:'2026-07-15',summary:'live empty 15',work:[]}
                  ];
                  current.dailyIntegrityV551={installedAt:'live-old'};
                  current.dailyRecoveryV552={version:'live-old',complete:false};
                  localStorage.setItem(key,JSON.stringify(current));
                });
                await page.reload({waitUntil:'load',timeout:45000});
                await page.waitForFunction(()=>window.CAREER_OS_V552?.complete===true,null,{timeout:20000});
                await page.waitForTimeout(2500);
                run.check=await page.evaluate(()=>{
                  const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                  const byDate=d=>S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d);
                  return {
                    title:document.title,
                    counts:{
                      '2026-07-13':work(byDate('2026-07-13')).length,
                      '2026-07-14':work(byDate('2026-07-14')).length,
                      '2026-07-15':work(byDate('2026-07-15')).length
                    },
                    selectedDate:S.selectedDate,
                    todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
                    historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate),
                    overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth,
                    recovery:window.CAREER_OS_V552
                  }
                });
              }
            }catch(e){run.navigationError=String(e?.stack||e)}
            const c=run.check?.counts||{};
            run.passed=run.status===200&&run.errors.length===0&&run.check?.title?.includes('V5.5.2')&&c['2026-07-13']===3&&c['2026-07-14']===4&&c['2026-07-15']===4&&run.check.selectedDate==='2026-07-15'&&run.check.todayStatus==='已记录'&&['2026-07-13','2026-07-14','2026-07-15'].every(x=>run.check.historyDates.includes(x))&&run.check.overflow<=1;
            result.runs.push(run);
            await browser.close();
          }
          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/v553-pages-live.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node pages-live.mjs
      - name: Upload live diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v553-pages-live-result
          path: /tmp/v553-pages-live.json
      - name: Publish live diagnostic
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS GitHub Pages live diagnostic'; echo '```json'; cat /tmp/v553-pages-live.json; echo '```'; } >/tmp/pages-live-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pages-live-comment.md
