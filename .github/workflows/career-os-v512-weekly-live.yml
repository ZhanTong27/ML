name: Career OS V5.12 Weekly Review Live

on:
  pull_request:
    branches: [main]
    paths:
      - career-roadmap/tools/v512-trigger.txt

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Register V5.12 source
        run: python3 career-roadmap/tools/v512_apply.py
      - name: Build and validate syntax
        run: |
          node --check career-roadmap/curriculum/v512-weekly-review-live.js
          python3 career-roadmap/build_single_file.py
          grep -q CAREER_OS_V512_WEEKLY_REVIEW_LIVE career-roadmap/index.html
          grep -q weekly-review-current-v595 career-roadmap/index.html
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Run browser acceptance
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/v512-weekly
          python3 -m http.server 8080 >/tmp/v512-weekly/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in {1..30}; do curl -fsS http://127.0.0.1:8080/career-roadmap/ >/dev/null && break; sleep 1; done
          node career-roadmap/tools/v512_check.mjs >/tmp/v512-weekly/node.log 2>&1
          exit 0
      - name: Upload browser acceptance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-os-v512-weekly-live
          path: /tmp/v512-weekly
      - name: Enforce browser acceptance
        run: python3 -c "import json; assert json.load(open('/tmp/v512-weekly/result.json'))['passed']"
      - name: Commit generated bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career-roadmap/build_single_file.py career-roadmap/index.html
          if ! git diff --cached --quiet; then
            git commit -m "Build V5.12 live weekly review"
            git push origin HEAD:${{ github.head_ref }}
          fi
