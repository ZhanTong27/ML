name: Career OS Published URL Smoke Test

on:
  pull_request:
    paths:
      - '.github/workflows/career-os-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Test published page in Chromium
        run: |
          cat > smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const url='https://zhantong27.github.io/ML/?v=be5cdb7';
          const errors=[];
          const checks={url};
          let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            page.setDefaultTimeout(10000);
            page.on('pageerror',error=>errors.push(`pageerror: ${error.message}`));
            page.on('requestfailed',req=>{
              const failedUrl=req.url();
              if(failedUrl.includes('zhantong27.github.io/ML'))errors.push(`requestfailed: ${failedUrl} ${req.failure()?.errorText||''}`)
            });
            const response=await page.goto(url,{waitUntil:'domcontentloaded',timeout:30000});
            checks.httpStatus=response?.status()||0;
            await page.waitForFunction(()=>document.querySelector('#todayStatusRow')?.children.length===3,null,{timeout:15000});
            Object.assign(checks,await page.evaluate(()=>({
              title:document.title.includes('Career OS V2.3'),
              staticViews:document.querySelectorAll('.nav button').length,
              todayCount:document.querySelector('#todayStatusRow')?.children.length??-1,
              actionCount:document.querySelector('#todayActionList')?.children.length??-1,
              weekCount:document.querySelectorAll('#weekTabs button').length,
              cycleCount:document.querySelectorAll('#curriculumMap .curriculum-cycle').length,
              curriculumValue:document.documentElement.dataset.curriculum||'',
              abilityCount:document.querySelectorAll('#abilityGrid .ability').length,
              bodyHeight:document.body.getBoundingClientRect().height
            })));
            await page.click('[data-view="growth"]');
            checks.growthVisible=await page.locator('#growth').evaluate(el=>getComputedStyle(el).display!=='none');
            await page.click('#openQuick');
            checks.quickOpen=await page.locator('#quickModal').evaluate(el=>el.classList.contains('open'));
            await page.keyboard.press('Escape');
            await page.click('#openTools');
            checks.toolsOpen=await page.locator('#toolsModal').evaluate(el=>el.classList.contains('open'));
          }catch(error){errors.push(error?.stack||String(error))}finally{await browser?.close()}
          const passed=errors.length===0&&checks.httpStatus===200&&checks.title&&checks.staticViews===4&&checks.todayCount===3&&checks.actionCount>0&&checks.weekCount===16&&checks.cycleCount===4&&checks.curriculumValue==='soc-verification-16w-v1'&&checks.abilityCount===7&&checks.bodyHeight>500&&checks.growthVisible&&checks.quickOpen&&checks.toolsOpen;
          const result={passed,checks,errors};
          fs.writeFileSync('/tmp/smoke-result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node smoke.mjs
      - name: Publish diagnostic comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Published Career OS smoke diagnostic'
            echo '```json'
            cat /tmp/smoke-result.json
            echo '```'
          } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce published URL smoke test
        run: node -e "const r=require('/tmp/smoke-result.json'); if(!r.passed)process.exit(1)"
