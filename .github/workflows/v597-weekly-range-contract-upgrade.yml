name: Career OS V5.9.7 Weekly Range Contract Upgrade

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/v597-weekly-range-contract-upgrade.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Upgrade weekly range data contract
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('career-roadmap')

          # 1. Upgrade the shared app range helpers and all legacy weekly entry points.
          app_path = root / 'app.js'
          app = app_path.read_text(encoding='utf-8')

          old_helpers = """function weeklyRangeText(range){
            if(typeof range==='string')return range;
            if(range&&typeof range==='object'){
              const start=String(range.start||''),end=String(range.end||'');
              return start&&end?`${start}—${end}`:(start||end||'')
            }
            return ''
          }
          function weeklyRangeIncludes(range,date){
            if(typeof range==='string')return range.includes(date);
            if(range&&typeof range==='object'){
              const start=String(range.start||''),end=String(range.end||'');
              return Boolean(date&&(date===start||date===end||(start&&end&&date>=start&&date<=end)))
            }
            return false
          }
          function latestWeekly(){return [...S.weeklyReviews].sort((a,b)=>(b.createdAt||weeklyRangeText(b.range)).localeCompare(a.createdAt||weeklyRangeText(a.range)))[0]}"""

          new_helpers = """function weeklyRangeBounds(range,record={}){
            let start=String(record?.rangeStart||record?.start||''),end=String(record?.rangeEnd||record?.end||'');
            if(range&&typeof range==='object'){
              start=String(range.start||start||'');end=String(range.end||end||'')
            }else if(typeof range==='string'){
              const dates=range.match(/\\d{4}-\\d{2}-\\d{2}/g)||[];
              start=start||dates[0]||'';end=end||dates[1]||dates[0]||''
            }
            const label=start&&end?`${start}—${end}`:(start||end||(typeof range==='string'?range:''));
            return{start,end,label}
          }
          function weeklyRangeText(range,record={}){return weeklyRangeBounds(range,record).label}
          function weeklyRangeIncludes(range,date,record={}){
            const b=weeklyRangeBounds(range,record);
            if(!date)return false;
            if(b.start&&b.end)return date>=b.start&&date<=b.end;
            return b.label.includes(date)
          }
          function normalizeLegacyWeeklyRecord(record={}){
            const b=weeklyRangeBounds(record.range,record);
            return{...record,range:b.label,rangeStart:b.start,rangeEnd:b.end,rangeContract:'legacy-weekly-v2'}
          }
          function latestWeekly(){return [...S.weeklyReviews].sort((a,b)=>(b.createdAt||weeklyRangeText(b.range,b)).localeCompare(a.createdAt||weeklyRangeText(a.range,a)))[0]}"""

          if old_helpers not in app:
              raise SystemExit('Current weekly range helper block was not found')
          app = app.replace(old_helpers, new_helpers, 1)

          old_norm = "['dailyLogs','problemLogs','weeklyReviews','schedule','cycleArchives','customLearning'].forEach(k=>out[k]=arr(out[k]));\n  out.checks=out.checks||{};"
          new_norm = "['dailyLogs','problemLogs','weeklyReviews','schedule','cycleArchives','customLearning'].forEach(k=>out[k]=arr(out[k]));\n  out.weeklyReviews=out.weeklyReviews.map(normalizeLegacyWeeklyRecord);\n  out.checks=out.checks||{};"
          if old_norm not in app:
              raise SystemExit('normalizeState weekly collection block was not found')
          app = app.replace(old_norm, new_norm, 1)

          replacements = [
              ("weeklyRangeIncludes(x.range,start)", "weeklyRangeIncludes(x.range,start,x)"),
              ("weeklyRangeText(b.range)).localeCompare(a.createdAt||weeklyRangeText(a.range))", "weeklyRangeText(b.range,b)).localeCompare(a.createdAt||weeklyRangeText(a.range,a))"),
              ("weeklyRangeText(x.range)||'周度复盘'", "weeklyRangeText(x.range,x)||'周度复盘'"),
              ("if(mode==='weekly'){data.id=data.id||uid('weekly');data.range=data.range||$('#qRange').value;data.createdAt=localISO();S.weeklyReviews.unshift(data);applyWeeklyOutputs(data)}",
               "if(mode==='weekly'){data.id=data.id||uid('weekly');data.range=data.range||$('#qRange').value;data.createdAt=localISO();const normalized=normalizeLegacyWeeklyRecord(data);S.weeklyReviews.unshift(normalized);applyWeeklyOutputs(normalized)}"),
              ("const id=t.id||`custom-${(data.range||localISO()).replace(/\\D/g,'')}-${i}`;",
               "const period=weeklyRangeBounds(data.range,data);\n    const id=t.id||`custom-${(period.label||localISO()).replace(/\\D/g,'')}-${i}`;"),
              ("source:data.range})", "source:weeklyRangeText(data.range,data)})")
          ]
          for old, new in replacements:
              if old not in app:
                  raise SystemExit(f'Expected app source fragment not found: {old}')
              app = app.replace(old, new, 1)

          app_path.write_text(app, encoding='utf-8')

          # 2. Make the V4 import boundary canonical and explicit.
          reviews_path = root / 'curriculum/v40-reviews.js'
          reviews = reviews_path.read_text(encoding='utf-8')
          insert_after = "function installV40Reviews(){"
          helper = """
          function normalizeWeeklyPatchRangeV597(p){
            const copy={...(p||{})},range=copy.range;
            let start='',end='';
            if(range&&typeof range==='object'){start=String(range.start||'');end=String(range.end||'')}
            else if(typeof range==='string'){const dates=range.match(/\\d{4}-\\d{2}-\\d{2}/g)||[];start=dates[0]||'';end=dates[1]||dates[0]||''}
            start=start||String(copy.rangeStart||'');end=end||String(copy.rangeEnd||'');
            if(!start||!end)throw new Error('Weekly Patch range必须包含start和end');
            copy.range={start,end};copy.rangeLabel=`${start}—${end}`;copy.rangeContract='career-os-weekly-period-v2';
            return copy
          }
          """
          if 'function normalizeWeeklyPatchRangeV597' not in reviews:
              if insert_after not in reviews:
                  raise SystemExit('V4 install function was not found')
              reviews = reviews.replace(insert_after, helper + '\n' + insert_after, 1)

          old_import = "function importWeeklyV40(){try{const p=parseMaybeJSON($('#weeklyPatchV4').value);if(p.schemaVersion!=='career-os-v4-weekly-1')throw new Error('Weekly Patch版本不正确');"
          new_import = "function importWeeklyV40(){try{const p=normalizeWeeklyPatchRangeV597(parseMaybeJSON($('#weeklyPatchV4').value));if(p.schemaVersion!=='career-os-v4-weekly-1')throw new Error('Weekly Patch版本不正确');"
          if old_import not in reviews:
              raise SystemExit('V4 weekly import function was not found')
          reviews = reviews.replace(old_import, new_import, 1)
          reviews_path.write_text(reviews, encoding='utf-8')

          # 3. Add the permanent state migration and visible version marker.
          v597 = root / 'curriculum/v597-weekly-range-contract.js'
          v597.write_text("""(function(){
           const MARKER='CAREER_OS_V597_WEEKLY_RANGE_CONTRACT',BACKUP='zhantong-career-os-v5-pre-v597-weekly-range';
           function bounds(range,record={}){
            let start=String(record?.rangeStart||record?.start||''),end=String(record?.rangeEnd||record?.end||'');
            if(range&&typeof range==='object'){start=String(range.start||start||'');end=String(range.end||end||'')}
            else if(typeof range==='string'){const d=range.match(/\\d{4}-\\d{2}-\\d{2}/g)||[];start=start||d[0]||'';end=end||d[1]||d[0]||''}
            return{start,end,label:start&&end?`${start}—${end}`:(start||end||(typeof range==='string'?range:''))}
           }
           function migrate(){
            if(typeof S!=='object')return false;
            try{if(!localStorage.getItem(BACKUP))localStorage.setItem(BACKUP,JSON.stringify(S))}catch(e){}
            S.weeklyReviews=Array.isArray(S.weeklyReviews)?S.weeklyReviews.map(x=>{const b=bounds(x?.range,x);return{...x,range:b.label,rangeStart:b.start,rangeEnd:b.end,rangeContract:'legacy-weekly-v2'}}):[];
            S.weeklyReviewRecords=Array.isArray(S.weeklyReviewRecords)?S.weeklyReviewRecords.map(x=>{const b=bounds(x?.range,x);return{...x,range:{start:b.start,end:b.end},rangeLabel:b.label,rangeContract:'career-os-weekly-period-v2'}}):[];
            S.weeklyRangeContractV597={version:'5.9.7',legacyCollection:'weeklyReviews.range:string + rangeStart/rangeEnd',formalCollection:'weeklyReviewRecords.range:{start,end} + rangeLabel',migratedAt:S.weeklyRangeContractV597?.migratedAt||new Date().toISOString()};
            try{if(typeof save==='function')save()}catch(e){console.error('V5.9.7 range migration save failed',e)}
            return true
           }
           function badge(){
            document.title='Zhantong · Career OS V5.9.7';
            const side=document.querySelector('.side-title');if(side)side.textContent='CAREER OS · V5.9.7';
            const actions=document.querySelector('.top-actions');if(actions&&!document.getElementById('versionBadgeV597'))actions.insertAdjacentHTML('afterbegin','<span class="sync" id="versionBadgeV597">V5.9.7 · 周报范围已升级</span>')
           }
           function install(){migrate();badge();window.CAREER_OS_V597={marker:MARKER,version:'5.9.7',complete:true,backupKey:BACKUP}}
           if(document.readyState==='loading')window.addEventListener('load',install,{once:true});else install();
           window.addEventListener('pageshow',()=>{migrate();badge()});window.addEventListener('focus',()=>{migrate();badge()});
          })();
          """, encoding='utf-8')

          # 4. Load the contract last and require its marker in the generated artifact.
          build_path = root / 'build_single_file.py'
          build = build_path.read_text(encoding='utf-8')
          old_source = "    'curriculum/v596-weekly-career-model-review.js',\n]"
          new_source = "    'curriculum/v596-weekly-career-model-review.js',\n    'curriculum/v597-weekly-range-contract.js',\n]"
          if old_source not in build:
              raise SystemExit('V5.9.6 source tail was not found')
          build = build.replace(old_source, new_source, 1)
          old_marker = "    'CAREER_OS_V595_LAYOUT',\n"
          new_marker = "    'CAREER_OS_V595_LAYOUT',\n    'CAREER_OS_V597_WEEKLY_RANGE_CONTRACT',\n"
          if old_marker not in build:
              raise SystemExit('Required marker insertion point was not found')
          build = build.replace(old_marker, new_marker, 1)
          build_path.write_text(build, encoding='utf-8')

          # 5. Make the deployed build version visible and discourage stale HTML reuse.
          template_path = root / 'index.template.html'
          template = template_path.read_text(encoding='utf-8')
          meta_anchor = '  <meta name="color-scheme" content="dark">\n'
          meta_block = ('  <meta name="color-scheme" content="dark">\n'
                        '  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n'
                        '  <meta http-equiv="Pragma" content="no-cache">\n'
                        '  <meta http-equiv="Expires" content="0">\n'
                        '  <meta name="career-os-build" content="5.9.7-weekly-range-contract">\n')
          if 'career-os-build' not in template:
              if meta_anchor not in template:
                  raise SystemExit('Template metadata insertion point was not found')
              template = template.replace(meta_anchor, meta_block, 1)
          template_path.write_text(template, encoding='utf-8')

          # 6. Add a permanent regression assertion to the acceptance workflow.
          acceptance_path = Path('.github/workflows/v59-live-artifact-acceptance.yml')
          acceptance = acceptance_path.read_text(encoding='utf-8')
          if 'Weekly range object compatibility' not in acceptance:
              marker = '      - name: Install browser runtimes\n'
              check = """      - name: Weekly range object compatibility
                run: |
                  grep -q "CAREER_OS_V597_WEEKLY_RANGE_CONTRACT" career-roadmap/index.html
                  if grep -RInE "\\(x\\.range\\|\\|['\\\"]{2}\\)\\.includes|\\(data\\.range\\|\\|localISO\\(\\)\\)\\.replace" career-roadmap --include='*.js' --include='*.html'; then
                    echo "Unsafe weekly range handling found"
                    exit 1
                  fi

          """
              if marker not in acceptance:
                  raise SystemExit('Acceptance workflow insertion point was not found')
              acceptance = acceptance.replace(marker, check + marker, 1)
              acceptance_path.write_text(acceptance, encoding='utf-8')

          # 7. Full static scan before rebuilding.
          dangerous = [
              re.compile(r"\(x\.range\|\|['\"]{2}\)\.includes"),
              re.compile(r"\(data\.range\|\|localISO\(\)\)\.replace"),
              re.compile(r"(?:b|a)\.range\|\|['\"]{2}\)\.localeCompare")
          ]
          hits=[]
          for path in root.rglob('*'):
              if path.suffix not in {'.js','.html','.py'}: continue
              text=path.read_text(encoding='utf-8')
              for pattern in dangerous:
                  for match in pattern.finditer(text): hits.append((str(path),match.group(0)))
          if hits:
              raise SystemExit('Unsafe weekly range patterns remain: '+repr(hits))
          PY

      - name: Rebuild single-file Career OS
        run: python3 career-roadmap/build_single_file.py

      - name: Static validation
        run: |
          node --check career-roadmap/app.js
          node --check career-roadmap/curriculum/v40-reviews.js
          node --check career-roadmap/curriculum/v597-weekly-range-contract.js
          grep -q "CAREER_OS_V597_WEEKLY_RANGE_CONTRACT" career-roadmap/index.html
          grep -q "5.9.7-weekly-range-contract" career-roadmap/index.html
          if grep -RInE "\(x\.range\|\|['\"]{2}\)\.includes|\(data\.range\|\|localISO\(\)\)\.replace" career-roadmap --include='*.js' --include='*.html'; then
            echo "Unsafe weekly range handling remains"
            exit 1
          fi

      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install chromium webkit --with-deps >/tmp/playwright-install.log 2>&1 || (cat /tmp/playwright-install.log && exit 1)

      - name: Cross-browser object-range regression
        run: |
          python3 -m http.server 8080 >/tmp/career-os-v597-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in {1..30}; do curl -fsS http://127.0.0.1:8080/career-roadmap/ >/dev/null && break; sleep 1; done
          cat > /tmp/v597-check.mjs <<'EOF'
          import {chromium,webkit,devices} from 'playwright';
          const SITE='http://127.0.0.1:8080/career-roadmap/?build=5.9.7';
          const result=[];
          async function run(type,name,options){
            const browser=await type.launch({headless:true});
            const context=await browser.newContext(options);
            await context.addInitScript(()=>{
              localStorage.setItem('jett-career-os-v22',JSON.stringify({
                settings:{lastView:'today'},
                weeklyReviews:[{id:'legacy-object-range',range:{start:'2026-07-13',end:'2026-07-17'},workSummary:['object range regression']}],
                weeklyReviewRecords:[{schemaVersion:'career-os-v4-weekly-1',reviewId:'formal-object-range',range:{start:'2026-07-06',end:'2026-07-10'},summary:'formal range regression'}]
              }));
            });
            const page=await context.newPage();
            const errors=[];page.on('pageerror',e=>errors.push(e.message));page.on('console',m=>{if(m.type()==='error')errors.push(m.text())});
            const response=await page.goto(SITE,{waitUntil:'load',timeout:45000});
            await page.waitForFunction(()=>window.CAREER_OS_V597?.complete===true,null,{timeout:30000});
            await page.evaluate(()=>{renderAll();switchView('growth')});
            const before=await page.evaluate(()=>{
              const legacy=S.weeklyReviews.find(x=>x.id==='legacy-object-range');
              const formal=S.weeklyReviewRecords.find(x=>x.reviewId==='formal-object-range');
              return{
                title:document.title,
                badge:document.getElementById('versionBadgeV597')?.textContent||'',
                legacyRange:legacy?.range,
                legacyStart:legacy?.rangeStart,
                legacyEnd:legacy?.rangeEnd,
                formalObject:typeof formal?.range==='object',
                formalStart:formal?.range?.start,
                formalEnd:formal?.range?.end,
                formalLabel:formal?.rangeLabel
              }
            });
            await page.evaluate(()=>{
              const box=document.getElementById('weeklyPatchV4');
              box.value=JSON.stringify({schemaVersion:'career-os-v4-weekly-1',reviewId:'v597-import-regression',range:{start:'2026-07-20',end:'2026-07-24'},summary:'import regression',highlights:[],topEvidenceIds:[],diagnosisUpdates:[],courseDecision:{action:'keep',reason:'test',addedTasks:[]},nextWeek:{priority:'',workFocus:'',learningFocus:'',feedbackQuestion:''},resumeCandidates:[],missingInformation:[]});
              importWeeklyV40();
            });
            const after=await page.evaluate(()=>{
              const imported=S.weeklyReviewRecords.find(x=>x.reviewId==='v597-import-regression');
              renderAll();
              return{rangeObject:typeof imported?.range==='object',start:imported?.range?.start,end:imported?.range?.end,label:imported?.rangeLabel,contract:imported?.rangeContract}
            });
            const passed=response?.status()===200&&errors.length===0&&before.title.includes('V5.9.7')&&before.badge.includes('V5.9.7')&&before.legacyRange==='2026-07-13—2026-07-17'&&before.legacyStart==='2026-07-13'&&before.legacyEnd==='2026-07-17'&&before.formalObject&&before.formalLabel==='2026-07-06—2026-07-10'&&after.rangeObject&&after.start==='2026-07-20'&&after.end==='2026-07-24'&&after.label==='2026-07-20—2026-07-24'&&after.contract==='career-os-weekly-period-v2';
            result.push({name,passed,errors,before,after});await browser.close()
          }
          await run(chromium,'desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await run(webkit,'iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          console.log(JSON.stringify(result,null,2));
          if(result.some(x=>!x.passed))process.exit(1)
          EOF
          node /tmp/v597-check.mjs

      - name: Commit upgraded site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career-roadmap/app.js career-roadmap/index.template.html career-roadmap/index.html career-roadmap/build_single_file.py career-roadmap/curriculum/v40-reviews.js career-roadmap/curriculum/v597-weekly-range-contract.js .github/workflows/v59-live-artifact-acceptance.yml
          git commit -m "Upgrade weekly review range contract to V5.9.7"
          git push
