name: Bundle Career OS Single File

on:
  push:
    branches: [main]
    paths:
      - 'career-roadmap/index.template.html'
      - 'career-roadmap/style.css'
      - 'career-roadmap/legacy-data-v22.js'
      - 'career-roadmap/app.js'
      - 'career-roadmap/build_single_file.py'
      - 'career-roadmap/curriculum/**'
      - '.github/workflows/bundle-career-os.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: career-os-bundle
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate and validate self-contained index.html
        run: python3 career-roadmap/build_single_file.py --output index.html
      - name: Commit generated page
        run: |
          if git diff --quiet -- career-roadmap/index.html; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add career-roadmap/index.html
          git commit -m 'Bundle Career OS into single-file page'
          git push origin HEAD:main
