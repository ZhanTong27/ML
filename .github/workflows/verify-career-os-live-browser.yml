name: Verify Career OS Live Browser

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-career-os-live-browser.yml'
      - '.github/workflows/deploy-career-os-pages.yml'
      - 'career-roadmap/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  live-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for Pages publication
        run: sleep 35
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Verify live Career OS V5.8
        continue-on-error: true
        run: |
          cat > live-career-os.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const base='https://zhantong27.github.io/ML/';
          const result={url:base,passed:false,runs:[]};
          async function inspect(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const run={name,errors:[]};
            page.on('pageerror',e=>run.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')run.errors.push(`console: ${m.text()}`)});
            try{
              let response;
              for(let attempt=0;attempt<12;attempt++){
                response=await page.goto(`${base}?live_v58=${Date.now()}-${attempt}`,{waitUntil:'load',timeout:45000});
                await page.waitForTimeout(2200);
                if(response?.status()===200&&await page.evaluate(()=>window.CAREER_OS_V58?.complete===true))break;
                await page.waitForTimeout(6000)
              }
              run.httpStatus=response?.status()||0;
              await page.waitForFunction(()=>window.CAREER_OS_V58?.complete===true,null,{timeout:30000});
              await page.waitForTimeout(2800);
              await page.click('[data-view="growth"]');
              await page.waitForTimeout(700);
              run.check=await page.evaluate(()=>{
                const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                const byDate=d=>S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d);
                return {
                  title:document.title,version:S.version,marker:window.CAREER_OS_V58,
                  counts:{'2026-07-13':work(byDate('2026-07-13')).length,'2026-07-14':work(byDate('2026-07-14')).length,'2026-07-15':work(byDate('2026-07-15')).length,'2026-07-16':work(byDate('2026-07-16')).length},
                  selectedDate:S.selectedDate,todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
                  historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate),
                  nav:[...document.querySelectorAll('#growth-nav-v58 [data-v58-nav]')].map(x=>x.textContent.trim()),
                  actions:document.querySelectorAll('[data-v58-action]').length,
                  groups:document.querySelectorAll('[data-v58-action-group]').length,
                  materials:document.querySelectorAll('.action-materials-v58>article').length,
                  prompts:document.querySelectorAll('.action-prompt-v58').length,
                  selfChecks:document.querySelectorAll('[data-v58-selfcheck]').length,
                  signals:document.querySelectorAll('.signal-grid-v58>article').length,
                  abilities:document.querySelectorAll('.ability-cards-v58>article').length,
                  todayCompact:Boolean(document.querySelector('#uvmmsTodayV57 .v58-topic-line')),
                  portfolioCompact:Boolean(document.querySelector('#uvmmsPortfolioV57 .v58-topic-line')),
                  legacySafe:['current-execution','problem-journal','weekly-review','ability-map','cycle-archive','uvmms-adoption-v57'].every(id=>{const n=document.getElementById(id);return Boolean(n)&&!document.getElementById('growth-hub-v58')?.contains(n)}),
                  overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth
                }
              });
              const c=run.check.counts;
              run.passed=run.httpStatus===200&&run.errors.length===0&&run.check.title.includes('V5.8')&&String(run.check.version).startsWith('5.8')&&c['2026-07-13']===3&&c['2026-07-14']===4&&c['2026-07-15']===4&&c['2026-07-16']===5&&run.check.selectedDate==='2026-07-16'&&run.check.todayStatus==='已记录'&&['2026-07-13','2026-07-14','2026-07-15','2026-07-16'].every(x=>run.check.historyDates.includes(x))&&run.check.nav.join('|')==='本周成长|学习专题|能力与证据|复盘档案'&&run.check.actions===10&&run.check.groups===4&&run.check.materials>=20&&run.check.prompts===10&&run.check.selfChecks>=40&&run.check.signals===3&&run.check.abilities===5&&run.check.todayCompact&&run.check.portfolioCompact&&run.check.legacySafe&&run.check.overflow<=1
            }catch(e){run.errors.push(e?.stack||String(e));run.passed=false}
            result.runs.push(run);await browser.close()
          }
          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/career-os-live-browser.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node live-career-os.mjs
      - name: Post browser result to verification issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/career-os-live-browser.json ]; then printf '{"passed":false,"error":"browser result was not generated"}\n' >/tmp/career-os-live-browser.json; fi
          { echo '### Live V5.8 browser verification'; echo; echo 'Commit: `${{ github.sha }}`'; echo '```json'; cat /tmp/career-os-live-browser.json; echo '```'; } >/tmp/career-os-live-browser-comment.md
          gh issue comment 53 --repo "${{ github.repository }}" --body-file /tmp/career-os-live-browser-comment.md
      - name: Upload live-browser diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-os-live-browser-result
          path: /tmp/career-os-live-browser.json
      - name: Enforce live browser verification
        run: node -e "const r=require('/tmp/career-os-live-browser.json');if(!r.passed)process.exit(1)"
