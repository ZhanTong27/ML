name: Deploy Career OS to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/deploy-career-os-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Career OS
        uses: actions/upload-pages-artifact@v3
        with:
          path: career-roadmap
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
