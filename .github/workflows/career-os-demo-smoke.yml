name: Career OS Usage Demo Smoke

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/career-os-demo-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - run: |
          python3 -m http.server 8000 --directory . >/tmp/career-http.log 2>&1 &
          sleep 2
      - name: Validate interactive demo
        run: |
          cat > demo-smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const errors=[];const checks={};let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            page.setDefaultTimeout(7000);
            page.on('pageerror',e=>errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')errors.push(`console: ${m.text()}`)});
            const response=await page.goto('http://127.0.0.1:8000/career-roadmap/index.html',{waitUntil:'domcontentloaded',timeout:15000});
            checks.httpStatus=response?.status()||0;await page.waitForTimeout(2500);
            checks.title=(await page.title()).includes('Career OS V4.2');
            checks.demoButton=await page.locator('#openUsageDemo').count();
            checks.beforeState=await page.evaluate(()=>JSON.stringify({logs:S.dailyLogs.length,facts:S.facts.length,evidence:S.evidence.length,weekly:S.weeklyReviewRecords.length,monthly:S.monthlyReviewRecords.length}));
            await page.click('#openUsageDemo');await page.waitForTimeout(150);
            checks.open=await page.locator('#usageDemoV42').evaluate(el=>el.classList.contains('open'));
            checks.stepOne=(await page.locator('#demoTitleV42').innerText()).includes('5分钟看懂');
            for(let i=0;i<4;i++){await page.click('#demoNextV42');await page.waitForTimeout(120)}
            checks.growthView=await page.locator('#growth').evaluate(el=>getComputedStyle(el).display!=='none');
            checks.careerTarget=await page.locator('#career-model').evaluate(el=>el.classList.contains('demo-target-v42'));
            for(let i=0;i<5;i++){await page.click('#demoNextV42');await page.waitForTimeout(120)}
            checks.resumeView=await page.locator('#resume').evaluate(el=>getComputedStyle(el).display!=='none');
            checks.portfolioTarget=await page.locator('.portfolio-hero').evaluate(el=>el.classList.contains('demo-target-v42'));
            await page.keyboard.press('Escape');await page.waitForTimeout(100);
            checks.closed=await page.locator('#usageDemoV42').evaluate(el=>!el.classList.contains('open'));
            checks.afterState=await page.evaluate(()=>JSON.stringify({logs:S.dailyLogs.length,facts:S.facts.length,evidence:S.evidence.length,weekly:S.weeklyReviewRecords.length,monthly:S.monthlyReviewRecords.length}));
            checks.noDataChange=checks.beforeState===checks.afterState;
          }catch(e){errors.push(e?.stack||String(e))}finally{await browser?.close()}
          const passed=errors.length===0&&checks.httpStatus===200&&checks.title&&checks.demoButton===1&&checks.open&&checks.stepOne&&checks.growthView&&checks.careerTarget&&checks.resumeView&&checks.portfolioTarget&&checks.closed&&checks.noDataChange;
          const result={passed,checks,errors};fs.writeFileSync('/tmp/demo-result.json',JSON.stringify(result,null,2));console.log(JSON.stringify(result,null,2));
          EOF
          node demo-smoke.mjs
      - name: Publish diagnostic comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS V4.2 usage demo diagnostic'; echo '```json'; cat /tmp/demo-result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce demo test
        run: node -e "const r=require('/tmp/demo-result.json'); if(!r.passed)process.exit(1)"
