name: Career OS Smoke Test

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/career-os-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          python3 -m http.server 8000 --directory . >/tmp/career-http.log 2>&1 &
          sleep 2
      - name: Render site in Chromium
        run: |
          cat > smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const errors=[];const checks={};let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            page.setDefaultTimeout(7000);
            page.on('pageerror',e=>errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')errors.push(`console: ${m.text()}`)});
            page.on('requestfailed',r=>errors.push(`requestfailed: ${r.url()} ${r.failure()?.errorText||''}`));
            const response=await page.goto('http://127.0.0.1:8000/career-roadmap/index.html',{waitUntil:'domcontentloaded',timeout:15000});
            checks.httpStatus=response?.status()||0;await page.waitForTimeout(2500);
            Object.assign(checks,await page.evaluate(()=>({titleText:document.title,title:document.title.includes('Career OS V3.2'),staticViews:document.querySelectorAll('.nav button').length,todayCount:document.querySelector('#todayStatusRow')?.children.length??-1,weekCount:document.querySelectorAll('#weekTabs button').length,cycleCount:document.querySelectorAll('#curriculumMap .curriculum-cycle').length,decisionCards:document.querySelectorAll('#decisionCockpit article').length,resourceSection:Boolean(document.querySelector('#resources-v32')),pendingSection:Boolean(document.querySelector('#pending-confidence')),externalScripts:document.querySelectorAll('script[src]').length,externalStyles:document.querySelectorAll('link[rel="stylesheet"]').length,bodyHeight:document.body.getBoundingClientRect().height})));
            await page.click('[data-view="resume"]');
            checks.resumeVisible=await page.locator('#resume').evaluate(el=>getComputedStyle(el).display!=='none');
            checks.portfolioTitle=(await page.locator('#resume').innerText()).includes('ENGINEERING PORTFOLIO');
            checks.profileHero=await page.locator('.portfolio-hero').count();
            checks.educationCards=await page.locator('.education-card').count();
            checks.careerSteps=await page.locator('#experienceTimeline .career-step').count();
            checks.projectCards=await page.locator('#projectGrid .portfolio-project').count();
            checks.skillGroups=await page.locator('.skill-matrix-grid .skill-group').count();
            checks.riscV=(await page.locator('#projectGrid').innerText()).includes('RISC-V SoC');
            checks.intel=(await page.locator('#experienceTimeline').innerText()).includes('英特尔亚太研发公司');
            await page.click('#toggleRecruiterMode');
            checks.recruiterMode=await page.evaluate(()=>document.body.classList.contains('recruiter-mode'));
            checks.sideHidden=await page.locator('.side').evaluate(el=>getComputedStyle(el).display==='none');
            await page.click('#toggleRecruiterMode');
            await page.click('[data-view="career"]');checks.resourcesVisible=await page.locator('#resources-v32').evaluate(el=>getComputedStyle(el).display!=='none');
          }catch(e){errors.push(e?.stack||String(e))}finally{await browser?.close()}
          const passed=errors.length===0&&checks.httpStatus===200&&checks.title&&checks.staticViews===4&&checks.todayCount===3&&checks.weekCount===16&&checks.cycleCount===4&&checks.decisionCards===3&&checks.resourceSection&&checks.pendingSection&&checks.resumeVisible&&checks.portfolioTitle&&checks.profileHero===1&&checks.educationCards===2&&checks.careerSteps===2&&checks.projectCards===3&&checks.skillGroups===6&&checks.riscV&&checks.intel&&checks.recruiterMode&&checks.sideHidden&&checks.resourcesVisible&&checks.externalScripts===0&&checks.externalStyles===0&&checks.bodyHeight>500;
          const result={passed,checks,errors};fs.writeFileSync('/tmp/smoke-result.json',JSON.stringify(result,null,2));console.log(JSON.stringify(result,null,2));
          EOF
          node smoke.mjs
      - name: Publish diagnostic comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Engineering portfolio browser smoke diagnostic'; echo '```json'; cat /tmp/smoke-result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce browser smoke test
        run: node -e "const r=require('/tmp/smoke-result.json'); if(!r.passed)process.exit(1)"
