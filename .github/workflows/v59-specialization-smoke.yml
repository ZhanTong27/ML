name: Career OS V5.9 Parallel Specialization Smoke

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/v59-specialization-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  specialization:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    steps:
      - uses: actions/checkout@v4
      - name: Build single-file V5.9
        run: |
          python3 career-roadmap/build_single_file.py --output index.v59-test.html
          python3 - <<'PY'
          import re
          from pathlib import Path
          p=Path('career-roadmap/index.v59-test.html')
          html=p.read_text(encoding='utf-8')
          assert p.stat().st_size>0
          assert not re.search(r'<script\s+[^>]*src=',html,re.I)
          assert not re.search(r'<link\s+[^>]*rel=["\']stylesheet["\']',html,re.I)
          for marker in ['PARALLEL SPECIALIZATION TRACKS','Digitally Controlled On-Chip LDO','Analog Output-Capacitorless LDO Background','CAREER_OS_V59','Zhantong · Career OS V5.9']:
              assert marker in html, marker
          print({'bytes':len(html),'externalScripts':0,'externalStylesheets':0})
          PY
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Run Fresh, migration, independence and responsive checks
        continue-on-error: true
        run: |
          python3 -m http.server 8000 --directory . >/tmp/v59-http.log 2>&1 &
          cat > v59-smoke.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const url='http://127.0.0.1:8000/career-roadmap/index.v59-test.html';
          const result={passed:false,runs:[]};
          async function inspect(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const run={name,errors:[]};
            page.on('pageerror',e=>run.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')run.errors.push(`console: ${m.text()}`)});
            try{
              await page.goto(url,{waitUntil:'load'});
              await page.evaluate(()=>{localStorage.clear()});
              run.errors=[];
              await page.reload({waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V59?.complete===true,null,{timeout:30000});
              await page.waitForTimeout(2500);
              await page.click('[data-view="growth"]');
              await page.click('[data-v58-nav="topics"]');
              await page.waitForTimeout(700);
              run.fresh=await page.evaluate(()=>{
                const sp=S.specializationV59;
                return{
                  title:document.title,version:S.version,marker:window.CAREER_OS_V59,
                  cards:document.querySelectorAll('.v59-track-card').length,
                  dataCounts:{ocldo:SPECIALIZATION_V59.tracks.ocldo.units.length,uvmms:SPECIALIZATION_V59.tracks.uvmms.units.length},
                  states:{ocldo:Object.values(sp.tracks.ocldo.unitStates),uvmms:Object.values(sp.tracks.uvmms.unitStates)},
                  focus:{...sp.learningFocus},integration:{...sp.integrationProject},
                  nav:[...document.querySelectorAll('#growth-nav-v58 [data-v58-nav]')].map(x=>x.textContent.trim()),
                  terminology:{digital:document.documentElement.innerHTML.includes('Digitally Controlled On-Chip LDO'),analog:document.documentElement.innerHTML.includes('Analog Output-Capacitorless LDO Background'),disclaimer:document.documentElement.innerHTML.includes('不等同于新的Digital OCLDO Verification Track')},
                  old:{v57:Boolean(S.uvmmsProgramV57),v55:Boolean(S.amsFrontierV55),v58:Boolean(S.growthHubV58)},
                  overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth
                }
              });
              await page.click('#v59SwapFocus');
              await page.waitForTimeout(300);
              run.swap=await page.evaluate(()=>({...S.specializationV59.learningFocus}));
              await page.click('[data-v59-pause="uvmms"]');
              await page.waitForTimeout(250);
              run.pause=await page.evaluate(()=>({ocldo:S.specializationV59.tracks.ocldo.status,uvmms:S.specializationV59.tracks.uvmms.status}));
              await page.click('[data-v59-route="ocldo"]');
              await page.waitForTimeout(400);
              const first=page.locator('[data-v59-unit="ocldo-01"]');await first.click();await page.waitForTimeout(250);
              await page.check('[data-v59-check="0"][data-track="ocldo"][data-unit="ocldo-01"]');
              run.afterCheck=await page.evaluate(()=>S.specializationV59.tracks.ocldo.unitStates['ocldo-01']);
              for(const dim of ['understanding','practice','verificationDesign'])await page.selectOption(`[data-v59-assess="${dim}"][data-track="ocldo"][data-unit="ocldo-01"]`,'3');
              async function addEvidence(kind,title){await page.selectOption('#v59EvidenceKind',kind);await page.fill('#v59EvidenceTitle',title);await page.fill('#v59EvidenceDetail','public synthetic evidence');await page.click('[data-v59-add-evidence="ocldo"][data-unit="ocldo-01"]');await page.waitForTimeout(200)}
              await addEvidence('output','architecture output');await addEvidence('practice','timeline practice');await addEvidence('verification','sequence checker');
              await page.click('[data-v59-complete="ocldo"][data-unit="ocldo-01"]');await page.waitForTimeout(300);
              run.independence=await page.evaluate(()=>({o:S.specializationV59.tracks.ocldo.unitStates['ocldo-01'],u:S.specializationV59.tracks.uvmms.unitStates['uvmms-01'],related:S.specializationV59.tracks.uvmms.unitStates['uvmms-02'],integration:S.specializationV59.integrationProject.status}));
              await page.evaluate(()=>{
                const key='zhantong-career-os-v5';
                const old=JSON.parse(localStorage.getItem(key));
                old.v59MigrationSentinel='keep-old-data';
                old.dailyLogs=[{date:'2026-07-13',work:[]},{date:'2026-07-14',workItems:[]},{date:'2026-07-15',work:[]},{date:'2026-07-16',work:[]}];
                old.uvmmsProgramV57={note:'legacy adoption note',gates:{g0:true}};
                old.amsFrontierV55={reading:{'r-uvmms-standard':true},chapters:{},note:'legacy frontier note'};
                old.growthHubV58=old.growthHubV58||{};old.growthHubV58.actionNotes={...(old.growthHubV58.actionNotes||{}),'topic-uvmms-architecture':'legacy growth note'};
                delete old.specializationV59;delete old.specializationUpdateV59;
                localStorage.removeItem('zhantong-career-os-v5-pre-v59-backup');
                localStorage.removeItem('zhantong-career-os-v5-pre-v59-manifest');
                localStorage.setItem(key,JSON.stringify(old));
              });
              await page.reload({waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V59?.complete===true,null,{timeout:30000});
              await page.waitForTimeout(2600);
              run.migration=await page.evaluate(()=>{
                const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                const byDate=d=>S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d);
                const b=localStorage.getItem('zhantong-career-os-v5-pre-v59-backup')||'';
                return{
                  daily:['2026-07-13','2026-07-14','2026-07-15','2026-07-16'].map(d=>work(byDate(d)).length),
                  v57:S.uvmmsProgramV57?.note,v55:S.amsFrontierV55?.note,v58:S.growthHubV58?.actionNotes?.['topic-uvmms-architecture'],
                  backup:Boolean(b),backupSentinel:b.includes('keep-old-data'),manifest:Boolean(localStorage.getItem('zhantong-career-os-v5-pre-v59-manifest')),
                  prior:{o:S.specializationV59.tracks.ocldo.priorKnowledge.length,u:S.specializationV59.tracks.uvmms.priorKnowledge.length},
                  completed:{o:Object.values(S.specializationV59.tracks.ocldo.unitStates).filter(x=>x==='completed').length,u:Object.values(S.specializationV59.tracks.uvmms.unitStates).filter(x=>x==='completed').length},
                  integration:S.specializationV59.integrationProject.status,
                  overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth
                }
              });
              await page.click('[data-view="growth"]');await page.click('[data-v58-nav="topics"]');await page.waitForTimeout(500);await page.click('[data-v59-route="uvmms"]');await page.waitForTimeout(350);await page.click('[data-v59-unit="uvmms-01"]');await page.waitForTimeout(250);
              await page.fill('[data-v59-note][data-track="uvmms"][data-unit="uvmms-01"]','persisted unit note');await page.locator('[data-v59-note][data-track="uvmms"][data-unit="uvmms-01"]').evaluate(el=>el.dispatchEvent(new Event('change',{bubbles:true})));
              await page.reload({waitUntil:'load'});await page.waitForFunction(()=>window.CAREER_OS_V59?.complete===true,null,{timeout:30000});await page.waitForTimeout(1800);
              run.persist=await page.evaluate(()=>({note:S.specializationV59.tracks.uvmms.notes['uvmms-01'],backup:(localStorage.getItem('zhantong-career-os-v5-pre-v59-backup')||'').includes('keep-old-data'),v57:S.uvmmsProgramV57?.note,overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth}));
              const f=run.fresh,m=run.migration;
              run.passed=run.errors.length===0&&f.title.includes('V5.9')&&String(f.version).startsWith('5.9')&&f.marker?.complete===true&&f.cards===2&&f.dataCounts.ocldo===10&&f.dataCounts.uvmms===9&&f.states.ocldo.filter(x=>x==='completed').length===0&&f.states.uvmms.filter(x=>x==='completed').length===0&&f.focus.primaryTrack==='ocldo'&&f.focus.secondaryTrack==='uvmms'&&f.integration.status==='locked'&&f.nav.join('|')==='本周成长|学习专题|能力与证据|复盘档案'&&Object.values(f.terminology).every(Boolean)&&f.overflow<=1&&run.swap.primaryTrack==='uvmms'&&run.swap.secondaryTrack==='ocldo'&&run.pause.ocldo!=='paused'&&run.pause.uvmms==='paused'&&run.afterCheck!=='completed'&&run.independence.o==='completed'&&run.independence.u!=='completed'&&run.independence.related!=='completed'&&run.independence.integration==='locked'&&m.daily.join('/')==='3/4/4/5'&&m.v57==='legacy adoption note'&&m.v55==='legacy frontier note'&&m.v58==='legacy growth note'&&m.backup&&m.backupSentinel&&m.manifest&&m.prior.u>0&&m.completed.o===0&&m.completed.u===0&&m.integration==='locked'&&m.overflow<=1&&run.persist.note==='persisted unit note'&&run.persist.backup&&run.persist.v57==='legacy adoption note'&&run.persist.overflow<=1;
            }catch(e){run.errors.push(e?.stack||String(e));run.passed=false}
            result.runs.push(run);await browser.close()
          }
          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/v59-result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node v59-smoke.mjs
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v59-specialization-result
          path: /tmp/v59-result.json
      - name: Comment PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/v59-result.json ]; then printf '{"passed":false,"error":"result missing"}\n' >/tmp/v59-result.json; fi
          { echo '### Career OS V5.9 specialization smoke'; echo '```json'; cat /tmp/v59-result.json; echo '```'; } >/tmp/v59-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --repo "${{ github.repository }}" --body-file /tmp/v59-comment.md
      - name: Enforce checks
        run: node -e "const r=require('/tmp/v59-result.json');if(!r.passed)process.exit(1)"
