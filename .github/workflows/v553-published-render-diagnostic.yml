name: Career OS V5.5.2 Published Render Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/v553-published-render-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  published-render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Test actual published URLs
        continue-on-error: true
        run: |
          cat > published-render.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';

          const commit='6d0650a054c0941dc4beb74e94499c95eecfdd41';
          const urls={
            htmlpreview:`https://htmlpreview.github.io/?https://github.com/ZhanTong27/ML/blob/${commit}/career-roadmap/index.html`,
            rawgithack:`https://raw.githack.com/ZhanTong27/ML/${commit}/career-roadmap/index.html`,
            jsdelivr:`https://cdn.jsdelivr.net/gh/ZhanTong27/ML@${commit}/career-roadmap/index.html`
          };
          const result={commit,urls,runs:[]};

          async function inspect(browserType,browserName,contextOptions){
            const browser=await browserType.launch({headless:true});
            try{
              for(const [source,url] of Object.entries(urls)){
                const context=await browser.newContext(contextOptions);
                const page=await context.newPage();
                const run={browser:browserName,source,url,errors:[],consoleErrors:[]};
                page.on('pageerror',e=>run.errors.push(String(e.message||e)));
                page.on('console',m=>{if(m.type()==='error')run.consoleErrors.push(m.text())});
                try{
                  const response=await page.goto(url,{waitUntil:'load',timeout:45000});
                  run.httpStatus=response?.status()||0;
                  run.finalUrl=page.url();
                  await page.waitForTimeout(4500);
                  run.fresh=await page.evaluate(()=>{
                    const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                    const byDate=d=>(typeof S!=='undefined'&&Array.isArray(S.dailyLogs))?S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d):null;
                    return {
                      title:document.title,
                      bodyText:document.body.innerText.slice(0,1800),
                      v552:window.CAREER_OS_V552||null,
                      selectedDate:typeof S!=='undefined'?S.selectedDate:null,
                      counts:{
                        '2026-07-13':work(byDate('2026-07-13')).length,
                        '2026-07-14':work(byDate('2026-07-14')).length,
                        '2026-07-15':work(byDate('2026-07-15')).length
                      },
                      todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
                      calendarDetail:document.querySelector('#calendarDayDetail')?.innerText?.slice(0,500)||'',
                      historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate),
                      scriptCount:document.scripts.length,
                      storageReadable:(()=>{try{localStorage.setItem('__career_diag','1');const ok=localStorage.getItem('__career_diag')==='1';localStorage.removeItem('__career_diag');return ok}catch(e){return String(e)}})()
                    }
                  });

                  try{
                    await page.evaluate(()=>{
                      const key='zhantong-career-os-v5';
                      const current=JSON.parse(localStorage.getItem(key)||'{}');
                      current.selectedDate='2026-07-15';
                      current.calendarMonth='2026-07';
                      current.dailyLogs=[
                        {date:'2026-07-13',summary:'published empty 13',work:[]},
                        {date:'2026-07-14',summary:'published empty 14',workItems:[]},
                        {date:'2026-07-15',summary:'published empty 15',work:[]}
                      ];
                      current.dailyIntegrityV551={installedAt:'published-old'};
                      current.dailyRecoveryV552={version:'published-old',complete:false};
                      localStorage.setItem(key,JSON.stringify(current));
                    });
                    await page.reload({waitUntil:'load',timeout:45000});
                    await page.waitForTimeout(4500);
                    run.stale=await page.evaluate(()=>{
                      const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                      const byDate=d=>(typeof S!=='undefined'&&Array.isArray(S.dailyLogs))?S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d):null;
                      return {
                        title:document.title,
                        v552:window.CAREER_OS_V552||null,
                        selectedDate:typeof S!=='undefined'?S.selectedDate:null,
                        counts:{
                          '2026-07-13':work(byDate('2026-07-13')).length,
                          '2026-07-14':work(byDate('2026-07-14')).length,
                          '2026-07-15':work(byDate('2026-07-15')).length
                        },
                        todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
                        calendarDetail:document.querySelector('#calendarDayDetail')?.innerText?.slice(0,500)||'',
                        historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate)
                      }
                    });
                  }catch(e){run.staleError=String(e?.stack||e)}
                }catch(e){run.navigationError=String(e?.stack||e)}
                result.runs.push(run);
                await context.close();
              }
            }finally{await browser.close()}
          }

          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});

          for(const run of result.runs){
            const c=run.stale?.counts||run.fresh?.counts||{};
            run.recordsVisible=c['2026-07-13']===3&&c['2026-07-14']===4&&c['2026-07-15']===4;
          }
          result.summary=Object.fromEntries(Object.keys(urls).map(source=>[
            source,
            result.runs.filter(x=>x.source===source).map(x=>({browser:x.browser,httpStatus:x.httpStatus||0,recordsVisible:x.recordsVisible,title:x.stale?.title||x.fresh?.title||'',errors:x.errors,navigationError:x.navigationError||null}))
          ]));
          fs.writeFileSync('/tmp/v553-published-render.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result.summary,null,2));
          EOF
          node published-render.mjs
      - name: Upload published diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v553-published-render-result
          path: /tmp/v553-published-render.json
      - name: Publish concise diagnostic
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY' >/tmp/comment.md
          import json
          p='/tmp/v553-published-render.json'
          data=json.load(open(p))
          print('### Career OS published-render diagnostic')
          print('```json')
          print(json.dumps(data.get('summary',{}),ensure_ascii=False,indent=2))
          print('```')
          PY
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
