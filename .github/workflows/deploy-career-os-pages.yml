name: Deploy Career OS to GitHub Pages

on:
  pull_request:
    paths:
      - 'career-roadmap/index.template.html'
      - 'career-roadmap/style.css'
      - 'career-roadmap/legacy-data-v22.js'
      - 'career-roadmap/app.js'
      - 'career-roadmap/build_single_file.py'
      - 'career-roadmap/curriculum/**'
      - '.github/workflows/deploy-career-os-pages.yml'
  push:
    branches: [main]
    paths:
      - 'career-roadmap/index.template.html'
      - 'career-roadmap/style.css'
      - 'career-roadmap/legacy-data-v22.js'
      - 'career-roadmap/app.js'
      - 'career-roadmap/build_single_file.py'
      - 'career-roadmap/curriculum/**'
      - '.github/workflows/deploy-career-os-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: career-os-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build canonical V5.9 single-file page
        run: |
          rm -rf _site
          mkdir -p _site
          python3 career-roadmap/build_single_file.py --output ../_site/index.html
          cp _site/index.html _site/404.html
          touch _site/.nojekyll
          python3 - <<'PY'
          import re
          from pathlib import Path
          html=Path('_site/index.html').read_text(encoding='utf-8')
          assert 'CAREER_OS_V59' in html
          assert 'PARALLEL SPECIALIZATION TRACKS' in html
          assert 'Digitally Controlled On-Chip LDO' in html
          assert 'UVM-MS Personal Learning Track' in html
          assert not re.search(r'<script\s+[^>]*src=',html,re.I)
          assert not re.search(r'<link\s+[^>]*rel=["\']stylesheet["\']',html,re.I)
          print({'bytes':len(html),'version':'5.9.0'})
          PY
      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: career-os-pages-preview
          path: _site

  publish:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production site
        run: |
          rm -rf _site
          mkdir -p _site
          python3 career-roadmap/build_single_file.py --output ../_site/index.html
          cp _site/index.html _site/404.html
          touch _site/.nojekyll
      - name: Publish V5.9 to active gh-pages source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd _site
          git init -b gh-pages
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html 404.html .nojekyll
          git commit -m "Publish Career OS V5.9 from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:gh-pages

  verify-published-source:
    if: github.event_name != 'pull_request'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for the public V5.9 source
        run: |
          for attempt in $(seq 1 24); do
            curl -fsSL "https://zhantong27.github.io/ML/?deploy_v59=${GITHUB_SHA}-${attempt}" -o /tmp/site.html || true
            if grep -q 'CAREER_OS_V59' /tmp/site.html 2>/dev/null && grep -q 'PARALLEL SPECIALIZATION TRACKS' /tmp/site.html 2>/dev/null; then
              echo "V5.9 public source detected on attempt ${attempt}"
              exit 0
            fi
            sleep 5
          done
          echo 'V5.9 public source was not detected in time'
          exit 1
