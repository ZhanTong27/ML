name: July 14 Daily Patch Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/v47-daily-20260714-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8000 --directory . >/tmp/http.log 2>&1 &
          sleep 2
      - run: |
          # July 14 validation trigger
          cat > check.mjs <<'EOF'
          import {chromium} from 'playwright';
          const b=await chromium.launch({headless:true});const p=await b.newPage({viewport:{width:1440,height:1100}});const e=[];
          p.on('pageerror',x=>e.push(x.message));p.on('console',m=>{if(m.type()==='error')e.push(m.text())});await p.goto('http://127.0.0.1:8000/career-roadmap/index.html');await p.waitForTimeout(3000);
          const c=await p.evaluate(()=>{const id='2026-07-14-k8m4',log=S.dailyLogs.find(x=>x.patchId===id),ds=['diag-systematic-debug-method','diag-mixedsignal-delivery-boundary','diag-environment-integration-understanding'];return{title:document.title.includes('V4.7'),patch:S.patchHistory.some(x=>x.patchId===id),selected:S.selectedDate,work:log?.workItems?.length,facts:S.facts.filter(x=>x.patchId===id).length,evidence:S.evidence.filter(x=>x.patchId===id).length,diagnoses:S.diagnoses.filter(x=>x.patchId===id).length,diagConfidence:Object.fromEntries(ds.map(x=>[x,S.diagnoses.find(d=>d.id===x)?.diagnosisConfidence])),formal:Object.fromEntries(ds.map(x=>[x,S.careerModel.find(d=>d.diagnosisId===x)?.diagnosisConfidence])),pending:Object.fromEntries(ds.map(x=>[x,S.pendingConfidence.find(d=>d.diagnosisId===x&&d.patchId===id)?.range])),weekly:S.weeklyObservations.filter(x=>x.patchId===id).length,intervention:log?.roadmapIntervention,missing:log?.missingInformation?.length,custom:S.customLearning.length,ai:S.abilities.find(x=>x.id==='aiVerification')?.level,portfolio:S.resume?.projects?.length||0,finance:Boolean(S.resources?.snapshot)}});
          await p.click('[data-view="today"]');const text=await p.locator('#dailyRecordDetail').innerText();c.ui=['功能场景调试与算法扫视','前一日异常根因确认','数模混合模型交付边界协调','环境生成脚本与子系统配置确认'].every(x=>text.includes(x));
          await p.click('[data-view="growth"]');c.pendingUi=(await p.locator('#pendingConfidenceFeed').innerText()).includes('系统化调试方法')&&(await p.locator('#pendingConfidenceFeed').innerText()).includes('65% — 80%');c.aiOverlay=await p.locator('#ai-native-overlay-v47').count();await b.close();
          const ok=!e.length&&c.title&&c.patch&&c.selected==='2026-07-14'&&c.work===4&&c.facts===17&&c.evidence===7&&c.diagnoses===3&&c.diagConfidence['diag-systematic-debug-method']===74&&c.diagConfidence['diag-mixedsignal-delivery-boundary']===68&&c.diagConfidence['diag-environment-integration-understanding']===64&&Object.values(c.formal).every(x=>x===0)&&c.pending['diag-systematic-debug-method'].join(',')==='65,80'&&c.pending['diag-mixedsignal-delivery-boundary'].join(',')==='60,75'&&c.pending['diag-environment-integration-understanding'].join(',')==='55,70'&&c.weekly===5&&c.intervention?.flag===false&&c.intervention?.proposalOnly===true&&c.missing===12&&c.custom===0&&c.ai===1&&c.portfolio>=7&&c.finance&&c.ui&&c.pendingUi&&c.aiOverlay===1;
          console.log(JSON.stringify({ok,c,e},null,2));if(!ok)process.exit(1);
          EOF
          node check.mjs
