name: Career OS Smoke Test

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/career-os-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          python3 -m http.server 8000 --directory . >/tmp/career-http.log 2>&1 &
          sleep 2
      - name: Render site in Chromium
        run: |
          cat > smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const errors=[];const checks={};let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            page.setDefaultTimeout(7000);
            page.on('pageerror',e=>errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')errors.push(`console: ${m.text()}`)});
            const response=await page.goto('http://127.0.0.1:8000/career-roadmap/index.html',{waitUntil:'domcontentloaded',timeout:15000});
            checks.httpStatus=response?.status()||0;await page.waitForTimeout(2500);
            Object.assign(checks,await page.evaluate(()=>({title:document.title.includes('Career OS V3.2'),staticViews:document.querySelectorAll('.nav button').length,weekCount:document.querySelectorAll('#weekTabs button').length,decisionCards:document.querySelectorAll('#decisionCockpit article').length,externalScripts:document.querySelectorAll('script[src]').length,dailyPatch:window.S?.patchHistory?.some(x=>x.patchId==='2026-07-13-a7f3')||false,dailyDate:window.S?.selectedDate||'',dailyWorkItems:window.S?.dailyLogs?.find(x=>x.patchId==='2026-07-13-a7f3')?.workItems?.length||0,facts0713:window.S?.facts?.filter(x=>x.patchId==='2026-07-13-a7f3').length||0,evidence0713:window.S?.evidence?.filter(x=>x.patchId==='2026-07-13-a7f3').length||0,diagnoses0713:window.S?.diagnoses?.filter(x=>x.patchId==='2026-07-13-a7f3').length||0,pending0713:window.S?.pendingConfidence?.filter(x=>x.patchId==='2026-07-13-a7f3').length||0,formalConfidenceUntouched:window.S?.careerModel?.filter(x=>['diag-sim-timing-debug','diag-ate-interface-knowledge','diag-lowpower-intent-judgment'].includes(x.diagnosisId)).every(x=>Number(x.diagnosisConfidence)===0)??false})));
            await page.click('[data-view="resume"]');checks.profileHero=await page.locator('.portfolio-hero').count();checks.projectCards=await page.locator('#projectGrid .portfolio-project').count();checks.skillGroups=await page.locator('.skill-matrix-grid .skill-group').count();
            await page.click('[data-view="today"]');checks.dailySummary=(await page.locator('#dailyRecordDetail').innerText()).includes('单元测试用例失败定位');
            await page.click('[data-view="growth"]');checks.pendingVisible=(await page.locator('#pendingConfidenceFeed').innerText()).includes('ATE流程与交付标准理解');checks.evidenceVisible=(await page.locator('#evidenceFeed').innerText()).includes('时钟门控可能未实现低功耗目标');
          }catch(e){errors.push(e?.stack||String(e))}finally{await browser?.close()}
          const passed=errors.length===0&&checks.httpStatus===200&&checks.title&&checks.staticViews===4&&checks.weekCount===16&&checks.decisionCards===3&&checks.externalScripts===0&&checks.dailyPatch&&checks.dailyDate==='2026-07-13'&&checks.dailyWorkItems===3&&checks.facts0713===14&&checks.evidence0713===6&&checks.diagnoses0713===3&&checks.pending0713===3&&checks.formalConfidenceUntouched&&checks.profileHero===1&&checks.projectCards===3&&checks.skillGroups===6&&checks.dailySummary&&checks.pendingVisible&&checks.evidenceVisible;
          const result={passed,checks,errors};fs.writeFileSync('/tmp/smoke-result.json',JSON.stringify(result,null,2));console.log(JSON.stringify(result,null,2));
          EOF
          node smoke.mjs
      - name: Publish diagnostic comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS daily record browser diagnostic'; echo '```json'; cat /tmp/smoke-result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce browser smoke test
        run: node -e "const r=require('/tmp/smoke-result.json'); if(!r.passed)process.exit(1)"
