name: Career OS V5.11 Final Daily Date Check

on:
  pull_request:
    branches: [main]
    paths:
      - career-roadmap/tools/v511-final-trigger.txt

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - run: python3 career-roadmap/tools/v511_apply.py
      - run: |
          node --check career-roadmap/app.js
          node --check career-roadmap/curriculum/v511-daily-date-integrity.js
          python3 career-roadmap/build_single_file.py
          grep -q CAREER_OS_V511_DAILY_DATE_INTEGRITY career-roadmap/index.html
          grep -q selected-date-wins career-roadmap/index.html
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - run: |
          python3 -m http.server 8080 >/tmp/v511-final-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in {1..30}; do curl -fsS http://127.0.0.1:8080/career-roadmap/ >/dev/null && break; sleep 1; done
          node career-roadmap/tools/v511_check.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career-roadmap/app.js career-roadmap/build_single_file.py career-roadmap/index.html
          git commit -m "Build V5.11 daily date integrity repair"
          git push origin HEAD:${{ github.head_ref }}
