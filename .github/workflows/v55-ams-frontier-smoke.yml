name: V5.5 AMS Frontier Smoke

on:
  pull_request:
    paths:
      - '.github/workflows/v55-ams-frontier-smoke.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8000 --directory . >/tmp/http.log 2>&1 &
          sleep 2
      - name: Validate independent AMS frontier
        run: |
          cat > smoke.mjs <<'EOF'
          import {chromium} from 'playwright';import fs from 'node:fs';
          const r={},errors=[];let browser;
          try{
            browser=await chromium.launch({headless:true});const page=await browser.newPage({viewport:{width:1440,height:1200}});page.on('pageerror',e=>errors.push(e.message));page.on('console',m=>{if(m.type()==='error')errors.push(m.text())});
            await page.goto('http://127.0.0.1:8000/career-roadmap/index.html');await page.waitForTimeout(4200);
            r.base=await page.evaluate(()=>({title:document.title,version:S?.version,daily15:(S?.learningResponses||[]).filter(x=>x.date==='2026-07-15').map(x=>x.id),ams:window.AMS_FRONTIER_V55?{maturity:AMS_FRONTIER_V55.maturity.length,readings:AMS_FRONTIER_V55.readings.length,papers:AMS_FRONTIER_V55.ocldo.papers.length,publicText:AMS_FRONTIER_V55.publicSignal.text,orgs:AMS_FRONTIER_V55.publicSignal.organizations}:null,state:S?.amsFrontierV55||null,meta:window.CAREER_OS_V55||null,frontierExists:!!document.getElementById('frontierBodyV50')}));
            await page.evaluate(()=>document.querySelector('.nav [data-view="growth"]')?.click());await page.waitForTimeout(300);
            r.ui=await page.evaluate(()=>{const box=document.getElementById('frontierBodyV50');return{section:document.querySelectorAll('#frontier-radar-v50').length,title:box?.querySelector('h2')?.textContent||'',text:box?.textContent||'',maturity:document.querySelectorAll('.ams-maturity-grid-v55>article').length,readings:document.querySelectorAll('[data-ams-reading]').length,chapters:document.querySelectorAll('[data-ams-chapter]').length,papers:document.querySelectorAll('.ocldo-paper-list-v55 article').length,links:box?.querySelectorAll('a').length||0,legacyLabStatus:document.querySelectorAll('#frontierStatusV50').length}});
            const chapterSet=await page.evaluate(()=>{const x=document.querySelector('[data-ams-chapter="c1"]');if(!x)return false;x.checked=true;x.dispatchEvent(new Event('change',{bubbles:true}));return true});await page.waitForTimeout(100);
            const readingSet=await page.evaluate(()=>{const x=document.querySelector('[data-ams-reading="r-uvmms-standard"]');if(!x)return false;x.checked=true;x.dispatchEvent(new Event('change',{bubbles:true}));return true});await page.waitForTimeout(100);
            const noteSet=await page.evaluate(()=>{const n=document.getElementById('amsFrontierNoteV55'),b=document.getElementById('saveAMSFrontierV55');if(!n||!b)return false;n.value='UVM-MS解决组件统一；连续Corner搜索需要可验证的目标函数。';b.click();return true});await page.waitForTimeout(160);r.interactive={elements:chapterSet&&readingSet&&noteSet};
            r.saved=await page.evaluate(()=>({chapter:S?.amsFrontierV55?.chapters?.c1,reading:S?.amsFrontierV55?.reading?.['r-uvmms-standard'],note:S?.amsFrontierV55?.note||''}));
            await page.reload();await page.waitForTimeout(3200);await page.evaluate(()=>document.querySelector('.nav [data-view="growth"]')?.click());await page.waitForTimeout(180);
            r.reload=await page.evaluate(()=>({title:document.title,version:S?.version,chapter:S?.amsFrontierV55?.chapters?.c1,reading:S?.amsFrontierV55?.reading?.['r-uvmms-standard'],note:S?.amsFrontierV55?.note||'',daily15:(S?.learningResponses||[]).filter(x=>x.date==='2026-07-15').map(x=>x.id),frontierText:document.getElementById('frontierBodyV50')?.textContent||''}));
            const mobile=await browser.newPage({viewport:{width:390,height:844}});await mobile.goto('http://127.0.0.1:8000/career-roadmap/index.html');await mobile.waitForTimeout(2700);await mobile.evaluate(()=>document.querySelector('.nav [data-view="growth"]')?.click());await mobile.waitForTimeout(150);r.mobile=await mobile.evaluate(()=>({overflow:document.documentElement.scrollWidth>document.documentElement.clientWidth,section:document.querySelectorAll('#frontier-radar-v50').length}));
          }catch(e){errors.push(`fatal:${e.stack||e.message}`)}finally{if(browser)await browser.close()}
          const dailyExpected=['learn-2026-07-15-waveform-rollover','learn-2026-07-15-clock-switch-bounds','learn-2026-07-15-hierarchical-wave-review'];const ams=r.base?.ams;const daily=r.base?.daily15||[];const verifiedSignal=!!ams&&ams.publicText.includes('UVM-MS工作组')&&ams.publicText.includes('不能据此推断')&&ams.orgs.some(x=>x.includes('Synopsys'));const pass=!errors.length&&r.base?.title==='Zhantong · Career OS V5.5'&&r.base?.version==='5.5'&&dailyExpected.every(x=>daily.includes(x))&&daily.length===3&&!daily.includes('learn-2026-07-15-ams-strategy')&&!daily.includes('learn-2026-07-15-ocldo-prep')&&ams?.maturity===7&&ams?.readings===10&&ams?.papers===4&&verifiedSignal&&r.base?.meta?.frontier==='independent-ams-verification'&&r.ui?.section===1&&r.ui?.title.includes('从当前任务脱钩')&&r.ui?.text.includes('研究行业走到哪里')&&r.ui?.text.includes('UVM-MS 1.0')&&r.ui?.text.includes('SystemVerilog Mixed-Signal Interface Types')&&r.ui?.text.includes('Federated Simulation')&&r.ui?.text.includes('Bayesian Optimization')&&r.ui?.text.includes('AnalogTester')&&r.ui?.text.includes('Output-Capacitorless LDO')&&r.ui?.text.includes('P.K.T. Mok')&&r.ui?.maturity===7&&r.ui?.readings===10&&r.ui?.chapters===5&&r.ui?.papers===4&&r.ui?.links>=18&&r.ui?.legacyLabStatus===0&&r.interactive?.elements&&r.saved?.chapter&&r.saved?.reading&&r.saved?.note.includes('连续Corner')&&r.reload?.title==='Zhantong · Career OS V5.5'&&r.reload?.version==='5.5'&&r.reload?.chapter&&r.reload?.reading&&r.reload?.note.includes('连续Corner')&&r.reload?.daily15?.length===3&&!r.mobile?.overflow&&r.mobile?.section===1;
          fs.writeFileSync('/tmp/result.json',JSON.stringify({pass,r,errors},null,2));
          EOF
          node smoke.mjs
      - name: Publish result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### V5.5 AMS Frontier smoke'; echo '```json'; cat /tmp/result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce
        run: node -e "const x=require('/tmp/result.json');if(!x.pass)process.exit(1)"
