name: Agent bundle Career OS V5.9.5

on:
  push:
    branches:
      - agent/weekly-crg-learning-library

permissions:
  contents: write

jobs:
  bundle:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/weekly-crg-learning-library
      - name: Build single-file page
        run: python3 career-roadmap/build_single_file.py
      - name: Commit generated artifact
        run: |
          if git diff --quiet -- career-roadmap/index.html; then
            echo "Generated artifact already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career-roadmap/index.html
          git commit -m "Bundle Career OS V5.9.5 artifact [skip ci]"
          git push origin HEAD:agent/weekly-crg-learning-library
