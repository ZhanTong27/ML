name: Career OS V5.11 Daily Date Integrity

on:
  pull_request:
    branches:
      - main
    paths:
      - career-roadmap/tools/v511-trigger.txt

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Register V5.11 source and patch core Daily import
        run: |
          python3 - <<'PY'
          from pathlib import Path

          build_path=Path('career-roadmap/build_single_file.py')
          text=build_path.read_text(encoding='utf-8')
          source="    'curriculum/v511-daily-date-integrity.js',\n"
          if source not in text:
              anchor="    'curriculum/v510-verification-mastery-ui.js',\n"
              if anchor not in text: raise SystemExit('V5.10 source anchor missing')
              text=text.replace(anchor,anchor+source,1)
          marker="    'CAREER_OS_V511_DAILY_DATE_INTEGRITY',\n"
          if marker not in text:
              anchor="    'Verification Engineering Mastery',\n"
              if anchor not in text: raise SystemExit('V5.10 marker anchor missing')
              text=text.replace(anchor,anchor+marker,1)
          build_path.write_text(text,encoding='utf-8')

          app_path=Path('career-roadmap/app.js')
          app=app_path.read_text(encoding='utf-8')
          if '日期栏是最终保存日期' not in app:
              old="  const dateField=mode==='daily'||mode==='problem'?`<label>日期<input id=\"qDate\" type=\"date\" value=\"${S.selectedDate}\"></label>`:mode==='weekly'?`<label>周次<input id=\"qRange\" value=\"${weekStart()}—${addDays(weekStart(),6)}\"></label>`:'';"
              new="  const dateField=mode==='daily'?`<label>日期<input id=\"qDate\" type=\"date\" value=\"${localISO()}\"></label><p class=\"muted\" style=\"margin:-4px 0 3px\">日期栏是最终保存日期；若JSON中的date不同，将以此处为准并记录冲突。</p>`:mode==='problem'?`<label>日期<input id=\"qDate\" type=\"date\" value=\"${S.selectedDate}\"></label>`:mode==='weekly'?`<label>周次<input id=\"qRange\" value=\"${weekStart()}—${addDays(weekStart(),6)}\"></label>`:'';"
              if old not in app: raise SystemExit('Daily quick-form date source not found')
              app=app.replace(old,new,1)
          if "resolution:'selected-date-wins'" not in app:
              start=app.index('function saveQuick(mode){')
              end=app.index('\nfunction applyWeeklyOutputs',start)
              replacement="""function saveQuick(mode){
  try{
    let successMessage='已保存并更新';
    if(mode==='schedule'){
      const title=$('#qTitle').value.trim();if(!title)throw new Error('请填写标题');S.schedule.push({id:uid('schedule'),date:$('#qDate').value||S.selectedDate,type:$('#qType').value,title,time:$('#qTime').value.trim()});
    }else{
      const data=parseMaybeJSON($('#qText').value);
      if(mode==='daily'){
        if(!data||typeof data!=='object'||Array.isArray(data))throw new Error('每日记录必须是JSON对象或完整文本');
        const formDate=$('#qDate').value||localISO();
        if(!/^\\d{4}-\\d{2}-\\d{2}$/.test(formDate))throw new Error('请选择有效日期');
        const payloadDate=/^\\d{4}-\\d{2}-\\d{2}$/.test(String(data.date||''))?String(data.date):'';
        data.id=data.id||uid('daily');data.date=formDate;
        if(payloadDate&&payloadDate!==formDate)data.importMeta={...(data.importMeta||{}),dateMismatch:{payloadDate,selectedDate:formDate,resolution:'selected-date-wins',resolvedAt:new Date().toISOString()}};
        S.dailyLogs=S.dailyLogs.filter(x=>x.date!==formDate);S.dailyLogs.push(data);S.selectedDate=formDate;S.calendarMonth=formDate.slice(0,7);
        if(payloadDate&&payloadDate!==formDate)successMessage=`已按日期栏保存到${formDate}，JSON日期${payloadDate}已忽略`;
      }
      if(mode==='problem'){data.id=data.id||uid('problem');data.date=data.date||$('#qDate').value||S.selectedDate;S.problemLogs.unshift(data)}
      if(mode==='weekly'){data.id=data.id||uid('weekly');data.range=data.range||$('#qRange').value;data.createdAt=localISO();const normalized=normalizeLegacyWeeklyRecord(data);S.weeklyReviews.unshift(normalized);applyWeeklyOutputs(normalized)}
      if(mode==='ability'){applyAbilityUpdate(data)}
      if(mode==='resume'){S.resume={...S.resume,...data};['education','experiences','projects','skills','awards','versions','candidates'].forEach(k=>S.resume[k]=arr(S.resume[k]))}
    }
    save();closeModals();renderAll();toast(successMessage)
  }catch(e){toast(e.message||'内容格式错误')}
}"""
              app=app[:start]+replacement+app[end:]
          app_path.write_text(app,encoding='utf-8')
          PY
      - name: Build and validate syntax
        run: |
          node --check career-roadmap/app.js
          node --check career-roadmap/curriculum/v511-daily-date-integrity.js
          python3 career-roadmap/build_single_file.py
          grep -q CAREER_OS_V511_DAILY_DATE_INTEGRITY career-roadmap/index.html
          grep -q selected-date-wins career-roadmap/index.html
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit >/tmp/v511-playwright.log 2>&1 || (cat /tmp/v511-playwright.log && exit 1)
      - name: Run migration and import-date acceptance
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/v511-acceptance
          python3 -m http.server 8080 >/tmp/v511-acceptance/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for i in {1..30}; do curl -fsS http://127.0.0.1:8080/career-roadmap/ >/dev/null && break; sleep 1; done
          cat > v511-check.mjs <<'EOF'
          import {chromium,webkit,devices} from 'playwright';
          import fs from 'node:fs';
          const SITE='http://127.0.0.1:8080/career-roadmap/?v511=1';
          const results=[];
          const baseState=(dailyLogs,selectedDate='2026-07-18')=>({selectedDate,calendarMonth:'2026-07',week:'w1',checks:{},settings:{lastView:'today'},dailyLogs,problemLogs:[],weeklyReviews:[],schedule:[],cycleArchives:[],customLearning:[],abilities:[],resume:{}});
          async function openSeeded(browser,options,state){const context=await browser.newContext(options);await context.addInitScript(s=>localStorage.setItem('jett-career-os-v22',JSON.stringify(s)),state);const page=await context.newPage();const errors=[];page.on('pageerror',e=>errors.push(e.message));page.on('console',m=>{if(m.type()==='error')errors.push(m.text())});const response=await page.goto(SITE,{waitUntil:'load',timeout:45000});await page.waitForFunction(()=>window.CAREER_OS_V511?.complete===true,null,{timeout:30000});return{context,page,errors,response}}
          async function run(type,name,options){
            const item={name,passed:false,errors:[]};let browser;
            try{
              browser=await type.launch({headless:true});
              const migratedRun=await openSeeded(browser,options,baseState([{id:'unrelated-0719',date:'2026-07-19',summary:'unrelated record must remain unchanged'},{id:'misdated-0720',date:'2026-07-18',summary:'完成line coverage补齐；导师将部分人力转向时钟与复位UT自动生成方向；尚未进入生成器实现阶段。'}]));
              const {page,errors,response}=migratedRun;
              const migrated=await page.evaluate(()=>({unrelated:S.dailyLogs.some(x=>x.id==='unrelated-0719'&&x.date==='2026-07-19'),moved:S.dailyLogs.some(x=>x.id==='misdated-0720'&&x.date==='2026-07-20'),oldMisdated:S.dailyLogs.some(x=>x.id==='misdated-0720'&&x.date==='2026-07-18'),selectedDate:S.selectedDate,backup:!!localStorage.getItem('zhantong-career-os-v5-pre-v511-daily-date')}));
              await page.evaluate(()=>openQuick('daily'));const defaultDate=await page.$eval('#qDate',el=>el.value);const localToday=await page.evaluate(()=>localISO());
              await page.evaluate(()=>{document.getElementById('qDate').value='2026-07-21';document.getElementById('qText').value=JSON.stringify({date:'2026-07-18',summary:'date conflict regression'});saveQuick('daily')});
              const imported=await page.evaluate(()=>{const record=S.dailyLogs.find(x=>x.date==='2026-07-21');return{saved:!!record,payloadDate:record?.importMeta?.dateMismatch?.payloadDate||'',resolution:record?.importMeta?.dateMismatch?.resolution||'',selectedDate:S.selectedDate,unrelatedStillThere:S.dailyLogs.some(x=>x.id==='unrelated-0719'&&x.date==='2026-07-19')}});
              await migratedRun.context.close();
              const untouchedRun=await openSeeded(browser,options,baseState([{id:'legitimate-0718',date:'2026-07-18',summary:'legitimate July 18 record without migration signatures'}]));
              const untouched=await untouchedRun.page.evaluate(()=>({remains:S.dailyLogs.some(x=>x.id==='legitimate-0718'&&x.date==='2026-07-18'),noUnexpectedJuly20:!S.dailyLogs.some(x=>x.id==='legitimate-0718'&&x.date==='2026-07-20')}));
              item.errors=[...errors,...untouchedRun.errors];item.migrated=migrated;item.defaultDate=defaultDate;item.localToday=localToday;item.imported=imported;item.untouched=untouched;item.http=[response?.status()||0,untouchedRun.response?.status()||0];
              item.passed=item.http.every(x=>x===200)&&item.errors.length===0&&migrated.unrelated&&migrated.moved&&!migrated.oldMisdated&&migrated.selectedDate==='2026-07-20'&&migrated.backup&&defaultDate===localToday&&imported.saved&&imported.payloadDate==='2026-07-18'&&imported.resolution==='selected-date-wins'&&imported.selectedDate==='2026-07-21'&&imported.unrelatedStillThere&&untouched.remains&&untouched.noUnexpectedJuly20;
              await untouchedRun.context.close();
            }catch(e){item.errors.push(e?.stack||String(e))}
            if(browser)await browser.close();results.push(item)
          }
          await run(chromium,'desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});await run(webkit,'iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          const report={passed:results.every(x=>x.passed),results};fs.writeFileSync('/tmp/v511-acceptance/result.json',JSON.stringify(report,null,2));console.log(JSON.stringify(report,null,2));
          EOF
          node v511-check.mjs >/tmp/v511-acceptance/node.log 2>&1
          exit 0
      - name: Upload V5.11 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-os-v511-acceptance
          path: /tmp/v511-acceptance
      - name: Enforce V5.11 acceptance
        run: python3 -c "import json; assert json.load(open('/tmp/v511-acceptance/result.json'))['passed']"
      - name: Commit generated repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career-roadmap/app.js career-roadmap/build_single_file.py career-roadmap/index.html
          if ! git diff --cached --quiet; then
            git commit -m "Build V5.11 daily date integrity repair"
            git push origin HEAD:${{ github.head_ref }}
          fi
