name: Career OS Daily History Compatibility Smoke

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/bundle-career-os.yml'
      - '.github/workflows/v56-daily-0716-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  daily-0716:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build branch single-file page
        run: python3 career-roadmap/build_single_file.py --output index.v57-daily-test.html
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Run Chromium and WebKit checks
        continue-on-error: true
        run: |
          python3 -m http.server 8000 --directory . >/tmp/v57-daily-http.log 2>&1 &
          cat > daily-smoke.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const result={passed:false,runs:[]};
          const url='http://127.0.0.1:8000/career-roadmap/index.v57-daily-test.html';
          async function inspect(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const run={name,errors:[]};
            page.on('pageerror',e=>run.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')run.errors.push(`console: ${m.text()}`)});
            try{
              await page.goto(url,{waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V56?.complete===true&&window.CAREER_OS_V57?.complete===true,null,{timeout:20000});
              await page.evaluate(()=>{
                const key='zhantong-career-os-v5';
                const state=JSON.parse(localStorage.getItem(key));
                state.selectedDate='2026-07-16';
                state.calendarMonth='2026-07';
                state.dailyLogs=[
                  {date:'2026-07-13',summary:'cached empty 13',work:[]},
                  {date:'2026-07-14',summary:'cached empty 14',workItems:[]},
                  {date:'2026-07-15',summary:'cached empty 15',work:[]},
                  {date:'2026-07-16',summary:'cached empty 16',work:[]}
                ];
                state.dailyIntegrityV551={installedAt:'old'};
                state.dailyRecoveryV552={version:'old',complete:false};
                state.dailyUpdateV56={version:'old',complete:false};
                localStorage.setItem(key,JSON.stringify(state));
              });
              run.errors=[];
              await page.reload({waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V56?.complete===true&&window.CAREER_OS_V57?.complete===true,null,{timeout:20000});
              await page.waitForTimeout(2500);
              run.check=await page.evaluate(()=>{
                const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                const byDate=d=>S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d);
                const log=byDate('2026-07-16');
                return {
                  title:document.title,
                  counts:{
                    '2026-07-13':work(byDate('2026-07-13')).length,
                    '2026-07-14':work(byDate('2026-07-14')).length,
                    '2026-07-15':work(byDate('2026-07-15')).length,
                    '2026-07-16':work(log).length
                  },
                  diagnoses:Array.isArray(log?.diagnoses)?log.diagnoses.length:0,
                  facts:S.facts.filter(x=>x.date==='2026-07-16').length,
                  evidence:S.evidence.filter(x=>x.sourceDate==='2026-07-16').length,
                  selectedDate:S.selectedDate,
                  todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
                  historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate),
                  overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth,
                  dailyUpdate:window.CAREER_OS_V56,
                  currentUpdate:window.CAREER_OS_V57
                }
              });
              await page.evaluate(()=>{const grid=document.querySelector('#calendarGrid');const details=grid?.closest('details');if(details)details.open=true;grid?.scrollIntoView({block:'center'})});
              run.details={};
              for(const date of ['2026-07-13','2026-07-14','2026-07-15','2026-07-16']){
                const cell=page.locator(`#calendarGrid [data-date="${date}"]`);
                if(await cell.count()!==1){run.errors.push(`${date} calendar cell missing`);continue}
                await cell.click();
                const text=await page.locator('#calendarDayDetail').innerText();
                run.details[date]=text.slice(0,320);
                if(text.includes('当天没有工作记录'))run.errors.push(`${date} empty in calendar detail`)
              }
              const c=run.check.counts;
              run.passed=run.errors.length===0&&run.check.title.includes('V5.7')&&c['2026-07-13']===3&&c['2026-07-14']===4&&c['2026-07-15']===4&&c['2026-07-16']===5&&run.check.diagnoses===4&&run.check.facts===16&&run.check.evidence===9&&run.check.selectedDate==='2026-07-16'&&run.check.todayStatus==='已记录'&&['2026-07-13','2026-07-14','2026-07-15','2026-07-16'].every(x=>run.check.historyDates.includes(x))&&run.check.overflow<=1;
            }catch(e){run.errors.push(e?.stack||String(e));run.passed=false}
            result.runs.push(run);
            await browser.close();
          }
          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/daily-history-result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node daily-smoke.mjs
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-history-compatibility-result
          path: /tmp/daily-history-result.json
      - name: Publish diagnostic
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS Daily history compatibility diagnostic'; echo '```json'; cat /tmp/daily-history-result.json; echo '```'; } >/tmp/daily-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/daily-comment.md
      - name: Enforce checks
        run: node -e "const r=require('/tmp/daily-history-result.json');if(!r.passed)process.exit(1)"
