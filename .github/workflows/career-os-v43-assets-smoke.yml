name: Career OS V4.3 Assets Smoke

on:
  pull_request:
    paths:
      - '.v43-assets-smoke-trigger'
      - '.github/workflows/career-os-v43-assets-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  assets:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - run: |
          python3 -m http.server 8000 --directory . >/tmp/career-http.log 2>&1 &
          sleep 2
      - name: Validate DJI career assets
        run: |
          cat > v43-smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const errors=[];const checks={};let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            page.setDefaultTimeout(7000);
            page.on('pageerror',e=>errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')errors.push(`console: ${m.text()}`)});
            const response=await page.goto('http://127.0.0.1:8000/career-roadmap/index.html',{waitUntil:'domcontentloaded',timeout:15000});
            checks.httpStatus=response?.status()||0;await page.waitForTimeout(2500);
            checks.title=(await page.title()).includes('Career OS V4.3');
            await page.click('[data-view="resume"]');
            checks.djiExperience=(await page.locator('#experienceTimeline').innerText()).includes('DJI');
            const projectText=await page.locator('#projectGrid').innerText();
            checks.projects=['频率监控IP','时钟复位模块','电压跌落检测IP','LDO验证规划'].every(x=>projectText.includes(x));
            checks.projectCount=await page.locator('#projectGrid .portfolio-project').count();
            checks.assetSection=await page.locator('#dji-assets-v43').count();
            checks.caseCount=await page.locator('#djiAssetBodyV43 .asset-card-v43').count();
            await page.click('[data-asset-tab="skills"]');checks.skillCount=await page.locator('#djiAssetBodyV43 .asset-table-v43 article').count();
            const skillText=await page.locator('#djiAssetBodyV43').innerText();checks.unconfirmedMarked=skillText.includes('Xrun / Git / Verdi')&&skillText.includes('待确认');
            await page.click('[data-asset-tab="pending"]');checks.pendingCount=await page.locator('#djiAssetBodyV43 li').count();checks.pendingBoundary=(await page.locator('#djiAssetBodyV43').innerText()).includes('不会自动进入正式简历');
            await page.click('#toggleRecruiterMode');await page.waitForTimeout(100);checks.recruiterHidesAssets=await page.locator('#dji-assets-v43').evaluate(el=>getComputedStyle(el).display==='none');
            checks.externalScripts=await page.locator('script[src]').count();
          }catch(e){errors.push(e?.stack||String(e))}finally{await browser?.close()}
          const passed=errors.length===0&&checks.httpStatus===200&&checks.title&&checks.djiExperience&&checks.projects&&checks.projectCount>=7&&checks.assetSection===1&&checks.caseCount===8&&checks.skillCount===9&&checks.unconfirmedMarked&&checks.pendingCount===8&&checks.pendingBoundary&&checks.recruiterHidesAssets&&checks.externalScripts===0;
          const result={passed,checks,errors};fs.writeFileSync('/tmp/v43-result.json',JSON.stringify(result,null,2));console.log(JSON.stringify(result,null,2));
          EOF
          node v43-smoke.mjs
      - name: Publish diagnostic comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS V4.3 DJI assets diagnostic'; echo '```json'; cat /tmp/v43-result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce test
        run: node -e "const r=require('/tmp/v43-result.json'); if(!r.passed)process.exit(1)"
