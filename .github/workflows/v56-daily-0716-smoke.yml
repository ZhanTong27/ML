name: Career OS V5.6 July 16 Smoke

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/bundle-career-os.yml'
      - '.github/workflows/v56-daily-0716-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  daily-0716:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build branch single-file page
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          root=Path('career-roadmap')
          html=(root/'index.template.html').read_text(encoding='utf-8')
          css=(root/'style.css').read_text(encoding='utf-8')
          marker='<link rel="stylesheet" href="style.css">'
          html=html.replace(marker,'<style>\n'+css+'\n</style>',1)
          sources=['legacy-data-v22.js','curriculum/base.js','curriculum/cycle1.js','curriculum/cycle2.js','curriculum/cycle3.js','curriculum/cycle4.js','app.js','curriculum/patch.js','curriculum/finalize.js']
          markers='\n'.join(f'<script src="{src}"></script>' for src in sources)
          ordered=['curriculum/v50-storage-bootstrap.js']+sources+['curriculum/manual-v31.js','curriculum/v32.js','curriculum/resume-v33.js','curriculum/resume-portfolio-v34.js','curriculum/daily-20260713.js','curriculum/daily-20260714-core.js','curriculum/daily-20260714-analysis.js','curriculum/daily-20260714.js','curriculum/daily-20260715-record.js','curriculum/daily-20260715-analysis.js','curriculum/daily-20260715.js','curriculum/daily-20260716-record.js','curriculum/daily-20260716-analysis.js','curriculum/daily-20260716.js','curriculum/v40-career-model.js','curriculum/v40-reviews.js','curriculum/v41-explorer.js','curriculum/v42-demo.js','curriculum/v43-dji-assets.js','curriculum/v44-finance-simple.js','curriculum/v45-personalized-learning.js','curriculum/v46-pack-w1.js','curriculum/v46-pack-w2.js','curriculum/v46-pack-w3.js','curriculum/v46-pack-w4.js','curriculum/v46-learning-pack-ui.js','curriculum/v47-ai-native-overlay.js','curriculum/v48-reality-responsive.js','curriculum/v49-identity-education.js','curriculum/v50-profile-source.js','curriculum/v50-frontier-methods.js','curriculum/v50-frontier-labs.js','curriculum/v50-frontier-ui.js','curriculum/v50-asset-system.js','curriculum/v50-simplicity-core.js','curriculum/v50-frontier-kickoff.js','curriculum/v50-finalize.js','curriculum/v51-daily-closure-loop.js','curriculum/v51-daily-closure-fixes.js','curriculum/v52-learning-seeds-a.js','curriculum/v52-learning-seeds-b.js','curriculum/v52-problem-learning-ui.js','curriculum/v52-problem-learning-core.js','curriculum/v53-daily-history-demo.js','curriculum/v53-demo-fix.js','curriculum/v54-learning-seeds-0715-a.js','curriculum/v54-learning-seeds-0715-b.js','curriculum/v54-finalize.js','curriculum/v55-ams-frontier-data.js','curriculum/v55-source-corrections.js','curriculum/v55-ams-frontier-ui.js','curriculum/v55-frontier-integration-fix.js','curriculum/v55-finalize.js','curriculum/v551-daily-integrity-hotfix.js','curriculum/v552-safari-daily-recovery.js','curriculum/v56-daily-0716-finalize.js']
          blocks=[]
          for src in ordered:
              code=(root/src).read_text(encoding='utf-8')
              code=re.sub(r'</script',r'<\\/script',code,flags=re.I)
              blocks.append(f'<script data-source="{src}">\n{code}\n</script>')
          html=html.replace(markers,'\n'.join(blocks[:len(sources)+1]),1)
          html=html.replace('</body>','\n'.join(blocks[len(sources)+1:])+'\n</body>',1)
          (root/'index.v56-test.html').write_text(html,encoding='utf-8')
          PY
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Run Chromium and WebKit checks
        continue-on-error: true
        run: |
          python3 -m http.server 8000 --directory . >/tmp/v56-http.log 2>&1 &
          cat > v56-smoke.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const result={passed:false,runs:[]};
          const url='http://127.0.0.1:8000/career-roadmap/index.v56-test.html';
          async function inspect(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const run={name,errors:[]};
            page.on('pageerror',e=>run.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')run.errors.push(`console: ${m.text()}`)});
            try{
              await page.goto(url,{waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V56?.complete===true,null,{timeout:20000});
              await page.evaluate(()=>{
                const key='zhantong-career-os-v5';
                const state=JSON.parse(localStorage.getItem(key));
                state.selectedDate='2026-07-16';
                state.calendarMonth='2026-07';
                state.dailyLogs=[
                  {date:'2026-07-13',summary:'cached empty 13',work:[]},
                  {date:'2026-07-14',summary:'cached empty 14',workItems:[]},
                  {date:'2026-07-15',summary:'cached empty 15',work:[]},
                  {date:'2026-07-16',summary:'cached empty 16',work:[]}
                ];
                state.dailyIntegrityV551={installedAt:'old'};
                state.dailyRecoveryV552={version:'old',complete:false};
                state.dailyUpdateV56={version:'old',complete:false};
                localStorage.setItem(key,JSON.stringify(state));
              });
              run.errors=[];
              await page.reload({waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V56?.complete===true,null,{timeout:20000});
              await page.waitForTimeout(2500);
              run.check=await page.evaluate(()=>{
                const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                const byDate=d=>S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d);
                const log=byDate('2026-07-16');
                return {
                  title:document.title,
                  counts:{
                    '2026-07-13':work(byDate('2026-07-13')).length,
                    '2026-07-14':work(byDate('2026-07-14')).length,
                    '2026-07-15':work(byDate('2026-07-15')).length,
                    '2026-07-16':work(log).length
                  },
                  diagnoses:Array.isArray(log?.diagnoses)?log.diagnoses.length:0,
                  facts:S.facts.filter(x=>x.date==='2026-07-16').length,
                  evidence:S.evidence.filter(x=>x.sourceDate==='2026-07-16').length,
                  selectedDate:S.selectedDate,
                  todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
                  todayText:document.querySelector('#todayActions')?.innerText||document.body.innerText,
                  historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate),
                  overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth,
                  update:window.CAREER_OS_V56
                }
              });
              await page.evaluate(()=>{const grid=document.querySelector('#calendarGrid');const details=grid?.closest('details');if(details)details.open=true;grid?.scrollIntoView({block:'center'})});
              run.details={};
              for(const date of ['2026-07-13','2026-07-14','2026-07-15','2026-07-16']){
                const cell=page.locator(`#calendarGrid [data-date="${date}"]`);
                if(await cell.count()!==1){run.errors.push(`${date} calendar cell missing`);continue}
                await cell.click();
                const text=await page.locator('#calendarDayDetail').innerText();
                run.details[date]=text.slice(0,320);
                if(text.includes('当天没有工作记录'))run.errors.push(`${date} empty in calendar detail`)
              }
              const c=run.check.counts;
              run.passed=run.errors.length===0&&run.check.title.includes('V5.6')&&c['2026-07-13']===3&&c['2026-07-14']===4&&c['2026-07-15']===4&&c['2026-07-16']===5&&run.check.diagnoses===4&&run.check.facts===16&&run.check.evidence===9&&run.check.selectedDate==='2026-07-16'&&run.check.todayStatus==='已记录'&&['2026-07-13','2026-07-14','2026-07-15','2026-07-16'].every(x=>run.check.historyDates.includes(x))&&run.check.overflow<=1;
            }catch(e){run.errors.push(e?.stack||String(e));run.passed=false}
            result.runs.push(run);
            await browser.close();
          }
          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/v56-daily-result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node v56-smoke.mjs
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v56-daily-0716-result
          path: /tmp/v56-daily-result.json
      - name: Publish diagnostic
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS V5.6 July 16 diagnostic'; echo '```json'; cat /tmp/v56-daily-result.json; echo '```'; } >/tmp/v56-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/v56-comment.md
      - name: Enforce checks
        run: node -e "const r=require('/tmp/v56-daily-result.json');if(!r.passed)process.exit(1)"
