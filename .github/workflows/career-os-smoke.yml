name: Career OS Smoke Test

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/career-os-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          python3 -m http.server 8000 --directory . >/tmp/career-http.log 2>&1 &
          sleep 2
      - name: Render V4.1 site in Chromium
        run: |
          cat > smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const errors=[];const checks={};let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            page.setDefaultTimeout(7000);
            page.on('pageerror',e=>errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')errors.push(`console: ${m.text()}`)});
            const response=await page.goto('http://127.0.0.1:8000/career-roadmap/index.html',{waitUntil:'domcontentloaded',timeout:15000});
            checks.httpStatus=response?.status()||0;await page.waitForTimeout(2500);
            Object.assign(checks,await page.evaluate(()=>({title:document.title.includes('Career OS V4.1'),staticViews:document.querySelectorAll('.nav button').length,weekCount:document.querySelectorAll('#weekTabs button').length,decisionCards:document.querySelectorAll('#decisionCockpit article').length,externalScripts:document.querySelectorAll('script[src]').length,dailyPatch:S.patchHistory.some(x=>x.patchId==='2026-07-13-a7f3'),dailyDate:S.selectedDate,dailyWorkItems:S.dailyLogs.find(x=>x.patchId==='2026-07-13-a7f3')?.workItems?.length||0,facts0713:S.facts.filter(x=>x.patchId==='2026-07-13-a7f3').length,evidence0713:S.evidence.filter(x=>x.patchId==='2026-07-13-a7f3').length,pending0713:S.pendingConfidence.filter(x=>x.patchId==='2026-07-13-a7f3').length,formalConfidenceUntouched:S.careerModel.filter(x=>['diag-sim-timing-debug','diag-ate-interface-knowledge','diag-lowpower-intent-judgment'].includes(x.diagnosisId)).every(x=>Number(x.diagnosisConfidence)===0)})));
            await page.click('[data-view="today"]');const impactText=await page.locator('#dailyCareerImpact').innerText();checks.dailyImpact=await page.locator('#dailyCareerImpact .impact-flow article').count()===5&&impactText.includes('Evidence');
            await page.click('[data-view="growth"]');
            checks.evidenceControls=await page.locator('#evidenceControlsV41').count();checks.evidenceSummary=await page.locator('#evidenceSummaryV41 article').count();checks.lifecycleControls=await page.locator('#diagnosisControlsV41').count();checks.reviewArchive=await page.locator('#reviewArchiveV41').count();
            const initialEvidence=await page.locator('#evidenceFeed .evidence-entry').count();await page.locator('#evidenceSearchV41').fill('低功耗');await page.waitForTimeout(100);const searchedEvidence=await page.locator('#evidenceFeed .evidence-entry').count();checks.evidenceSearch=initialEvidence>=6&&searchedEvidence>=1&&searchedEvidence<initialEvidence;
            await page.locator('#evidenceSearchV41').fill('');await page.locator('#evidenceDirectionV41').selectOption('counter');await page.waitForTimeout(100);checks.counterFilter=(await page.locator('#evidenceFeed .evidence-entry').count())>=1;
            await page.locator('#diagnosisLifecycleV41').selectOption('collecting');await page.waitForTimeout(100);checks.diagnosisFilter=(await page.locator('#diagnosisLifecycleGrid .lifecycle-card').count())>=1;
            const weekly={schemaVersion:'career-os-v4-weekly-1',reviewId:'2026-W29-smoke',range:{start:'2026-07-13',end:'2026-07-19'},summary:'测试周度复盘',highlights:['完成ATE流程审查'],topEvidenceIds:['ev-0713-ate-01'],diagnosisUpdates:[{diagnosisId:'diag-ate-interface-knowledge',lifecycle:'supported',previousConfidence:0,confirmedConfidence:68,evidenceStrength:'medium',reason:'周度确认',supportingEvidenceIds:['ev-0713-ate-01'],counterEvidenceIds:['ev-0713-ate-02']}],courseDecision:{action:'keep',reason:'保持主干',addedTasks:[]},nextWeek:{priority:'确认ATE交付标准',workFocus:'',learningFocus:'继续验证流程学习',feedbackQuestion:''},resumeCandidates:[],missingInformation:[]};
            await page.locator('#weeklyPatchV4').fill(JSON.stringify(weekly));await page.click('#importWeeklyV4');await page.waitForTimeout(300);
            Object.assign(checks,await page.evaluate(()=>({weeklyImported:S.weeklyReviewRecords.some(x=>x.reviewId==='2026-W29-smoke'),weeklyConfidence:S.careerModel.find(x=>x.diagnosisId==='diag-ate-interface-knowledge')?.diagnosisConfidence||0,lifecycle:S.diagnoses.find(x=>x.id==='diag-ate-interface-knowledge')?.lifecycle||'',historyPoints:S.diagnosisHistory.filter(x=>x.diagnosisId==='diag-ate-interface-knowledge').length,pendingRemoved:!S.pendingConfidence.some(x=>x.diagnosisId==='diag-ate-interface-knowledge')})));
            checks.weeklyArchive=(await page.locator('#reviewArchiveV41').innerText()).includes('测试周度复盘')&&(await page.locator('#reviewArchiveV41').innerText()).includes('68%');
            const monthly={schemaVersion:'career-os-v4-monthly-1',reviewId:'2026-07-smoke',month:'2026-07',summary:'测试月度复盘',growth:['形成ATE交付流程意识'],setbacks:['低功耗意图仍需确认'],keyEvidenceIds:[],careerChanges:[],curriculum:{status:'on_track',reason:'测试'},finance:{summary:'财务记录稳定',goalChanges:[]},nextMonthPriorities:['继续积累Evidence'],openQuestions:[]};
            await page.locator('#monthlyPatchV4').fill(JSON.stringify(monthly));await page.click('#importMonthlyV4');await page.waitForTimeout(300);await page.click('[data-review-view="monthly"]');await page.waitForTimeout(100);checks.monthlyArchive=(await page.locator('#reviewArchiveV41').innerText()).includes('测试月度复盘')&&(await page.locator('#reviewArchiveV41').innerText()).includes('继续积累Evidence');
            await page.click('[data-view="resume"]');checks.profileHero=await page.locator('.portfolio-hero').count();checks.projectCards=await page.locator('#projectGrid .portfolio-project').count();
          }catch(e){errors.push(e?.stack||String(e))}finally{await browser?.close()}
          const passed=errors.length===0&&checks.httpStatus===200&&checks.title&&checks.staticViews===4&&checks.weekCount===16&&checks.decisionCards===3&&checks.externalScripts===0&&checks.dailyPatch&&checks.dailyDate==='2026-07-13'&&checks.dailyWorkItems===3&&checks.facts0713===14&&checks.evidence0713===6&&checks.pending0713===3&&checks.formalConfidenceUntouched&&checks.dailyImpact&&checks.evidenceControls===1&&checks.evidenceSummary===4&&checks.lifecycleControls===1&&checks.reviewArchive===1&&checks.evidenceSearch&&checks.counterFilter&&checks.diagnosisFilter&&checks.weeklyImported&&checks.weeklyConfidence===68&&checks.lifecycle==='supported'&&checks.historyPoints>=2&&checks.pendingRemoved&&checks.weeklyArchive&&checks.monthlyArchive&&checks.profileHero===1&&checks.projectCards===3;
          const result={passed,checks,errors};fs.writeFileSync('/tmp/smoke-result.json',JSON.stringify(result,null,2));console.log(JSON.stringify(result,null,2));
          EOF
          node smoke.mjs
      - name: Publish diagnostic comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS V4.1 browser diagnostic'; echo '```json'; cat /tmp/smoke-result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce browser smoke test
        run: node -e "const r=require('/tmp/smoke-result.json'); if(!r.passed)process.exit(1)"
