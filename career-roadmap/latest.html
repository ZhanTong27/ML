<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Career OS · 正在加载最新版</title>
  <style>
    :root{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050a11;color:#eef7f8;font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif}.box{max-width:560px;margin:24px;padding:24px;border:1px solid #244252;border-radius:14px;background:#0b1722}.eyebrow{font-size:11px;letter-spacing:.16em;color:#35d6e8;font-weight:800}.muted{color:#8ca1ab;line-height:1.7}.error{color:#ffb6bf;white-space:pre-wrap;overflow-wrap:anywhere}button{border:1px solid #35d6e8;border-radius:8px;background:rgba(53,214,232,.1);color:#b8f1f4;padding:10px 14px;cursor:pointer}
  </style>
</head>
<body>
  <main class="box">
    <div class="eyebrow">CAREER OS · LATEST</div>
    <h1>正在加载最新版</h1>
    <p class="muted" id="status">正在修复旧周报兼容格式，并绕过浏览器缓存。</p>
    <pre class="error" id="error"></pre>
    <button id="retry" hidden>重新加载</button>
  </main>
  <script>
    (async function(){
      const KEY='jett-career-os-v22';
      const status=document.getElementById('status');
      const error=document.getElementById('error');
      const retry=document.getElementById('retry');
      retry.onclick=()=>location.reload();
      try{
        const raw=localStorage.getItem(KEY);
        if(raw){
          const state=JSON.parse(raw);
          if(Array.isArray(state.weeklyReviews)){
            let changed=false;
            state.weeklyReviews=state.weeklyReviews.map(item=>{
              if(item&&item.range&&typeof item.range==='object'){
                const start=String(item.range.start||'');
                const end=String(item.range.end||'');
                changed=true;
                return {...item,rangeObject:item.range,range:start&&end?`${start}—${end}`:(start||end||'周度复盘')};
              }
              return item;
            });
            if(changed)localStorage.setItem(KEY,JSON.stringify(state));
          }
        }
        const url=`./index.html?build=range-fix-c7cd2bd-${Date.now()}`;
        const response=await fetch(url,{cache:'no-store',headers:{'Cache-Control':'no-cache'}});
        if(!response.ok)throw new Error(`最新版页面加载失败：HTTP ${response.status}`);
        const html=await response.text();
        if(!html.includes('weeklyRangeIncludes'))throw new Error('服务器仍返回旧版页面，请稍后重新打开此入口。');
        document.open();
        document.write(html);
        document.close();
      }catch(e){
        status.textContent='加载没有完成。你的本地Career OS数据没有被删除。';
        error.textContent=e&&e.message?e.message:String(e);
        retry.hidden=false;
      }
    })();
  </script>
</body>
</html>
