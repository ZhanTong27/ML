name: Career OS V5.9.4 Public Validation

on:
  pull_request:
    paths:
      - '.github/workflows/v594-public-validation.yml'

permissions:
  contents: read

jobs:
  public-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit

      - name: Validate deployed site
        run: |
          mkdir -p /tmp/v594-public
          cat > public-check.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const SITE='https://zhantong27.github.io/ML/';
          const result={site:SITE,passed:false,runs:[]};
          async function run(type,name,options){
            const browser=await type.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const item={name,errors:[]};
            page.on('pageerror',e=>item.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')item.errors.push(`console: ${m.text()}`)});
            try{
              let response,ready=false;
              for(let i=0;i<15;i++){
                item.errors=[];
                response=await page.goto(`${SITE}?v594_public=${Date.now()}-${i}`,{waitUntil:'load',timeout:45000});
                await page.waitForTimeout(5200);
                ready=response?.status()===200&&await page.evaluate(()=>window.CAREER_OS_V594?.complete===true&&window.CRG_TRACK_V593?.marker==='CAREER_OS_V593_CRG_TRACK');
                if(ready)break;
                await page.waitForTimeout(5000);
              }
              item.httpStatus=response?.status()||0;
              if(!ready)throw new Error('Corrected V5.9.4 public artifact did not become ready');
              await page.click('[data-view="growth"]');
              await page.click('[data-v58-nav="topics"]');
              await page.waitForSelector('#crg-track-card-v594',{state:'visible',timeout:15000});
              await page.click('#toggleCrgTrackV594');
              await page.waitForSelector('#crg-track-detail-v594',{state:'visible',timeout:15000});
              await page.evaluate(()=>document.getElementById('crg-track-card-v594')?.scrollIntoView({block:'start'}));
              await page.waitForTimeout(250);
              await page.screenshot({path:`/tmp/v594-public/${name}-tracks.png`,fullPage:false});
              const crg=await page.evaluate(()=>{
                const card=document.getElementById('crg-track-card-v594'),detail=document.getElementById('crg-track-detail-v594');
                return{cardVisible:Boolean(card&&card.offsetParent!==null),detailVisible:Boolean(detail&&detail.offsetParent!==null),packs:detail?.querySelectorAll('.crg-pack-v594').length||0,domains:detail?.querySelectorAll('.crg-domain-grid-v594>article').length||0,state:S.specializationTracks?.crg?.status||'',intro:Boolean(document.querySelector('#v59-track-topics > .section-title p')?.innerText.includes('三条路线彼此独立')),overflow:Math.max(card?.scrollWidth-card?.clientWidth||0,detail?.scrollWidth-detail?.clientWidth||0)}
              });
              await page.click('[data-v58-nav="evidence"]');
              await page.waitForSelector('#crg-capability-v594',{state:'visible',timeout:15000});
              const evidence=await page.evaluate(()=>({visible:Boolean(document.getElementById('crg-capability-v594')?.offsetParent),title:document.querySelector('#v59-track-evidence > .section-title h2')?.innerText||''}));
              await page.click('[data-v58-nav="archive"]');
              await page.waitForSelector('#weekly-review-v594',{state:'visible',timeout:15000});
              await page.waitForSelector('#crg-archive-v594',{state:'visible',timeout:15000});
              await page.evaluate(()=>document.getElementById('weekly-review-v594')?.scrollIntoView({block:'start'}));
              await page.waitForTimeout(250);
              await page.screenshot({path:`/tmp/v594-public/${name}-weekly.png`,fullPage:false});
              const archive=await page.evaluate(()=>{const w=document.getElementById('weekly-review-v594'),a=document.getElementById('crg-archive-v594');return{weeklyVisible:Boolean(w&&w.offsetParent!==null),crgArchiveVisible:Boolean(a&&a.offsetParent!==null),diagnoses:w?.querySelectorAll('.weekly-diagnoses-v594>article').length||0,interventions:window.CAREER_OS_V592_WEEKLY_REVIEW?.interventions?.length||0,overflow:w?w.scrollWidth-w.clientWidth:999,pageOverflow:document.documentElement.scrollWidth-document.documentElement.clientWidth}});
              const marker=await page.evaluate(()=>window.CAREER_OS_V594);
              item.check={crg,evidence,archive,marker};
              item.passed=item.httpStatus===200&&item.errors.length===0&&marker?.complete===true&&crg.cardVisible&&crg.detailVisible&&crg.packs===3&&crg.domains===7&&crg.state==='not_started'&&crg.intro&&crg.overflow<=1&&evidence.visible&&evidence.title==='三条专项能力证据'&&archive.weeklyVisible&&archive.crgArchiveVisible&&archive.diagnoses===6&&archive.interventions===3&&archive.overflow<=1&&archive.pageOverflow<=1;
            }catch(e){item.errors.push(e?.stack||String(e));item.passed=false}
            result.runs.push(item);await browser.close()
          }
          await run(chromium,'desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await run(webkit,'iPhone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/v594-public/result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          if(!result.passed)process.exit(1);
          EOF
          node public-check.mjs

      - name: Upload public validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-os-v594-public-validation
          path: /tmp/v594-public