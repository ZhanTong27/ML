name: Career OS V5.9.7 Weekly Range Contract Upgrade

on:
  pull_request:
    branches:
      - main
    paths:
      - career-roadmap/tools/v597-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply upgrade once
        shell: bash
        run: |
          set -o pipefail
          if grep -q CAREER_OS_V597_WEEKLY_RANGE_CONTRACT career-roadmap/build_single_file.py; then
            echo "V5.9.7 already applied"
          else
            sed -i 's/{".js", ".html", ".py"}/{".js", ".html"}/' career-roadmap/tools/v597_upgrade.py
            python3 career-roadmap/tools/v597_upgrade.py 2>&1 | tail -80
          fi
      - run: python3 career-roadmap/build_single_file.py
      - run: node --check career-roadmap/app.js
      - run: node --check career-roadmap/curriculum/v40-reviews.js
      - run: node --check career-roadmap/curriculum/v597-weekly-range-contract.js
      - run: grep -q CAREER_OS_V597_WEEKLY_RANGE_CONTRACT career-roadmap/index.html
      - name: Commit upgrade to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add career-roadmap/app.js career-roadmap/index.template.html career-roadmap/index.html career-roadmap/latest.html career-roadmap/build_single_file.py career-roadmap/curriculum/v40-reviews.js career-roadmap/curriculum/v597-weekly-range-contract.js .github/workflows/v59-live-artifact-acceptance.yml
          if git diff --cached --quiet; then
            echo "No upgrade changes required"
          else
            git commit -m "Upgrade weekly review range contract to V5.9.7"
            git push origin HEAD:${{ github.head_ref }}
          fi
