name: V4.8 Reality Diagnostic Focused

on:
  pull_request:
    paths:
      - '.github/workflows/v48-reality-responsive-diagnostic2.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8000 --directory . >/tmp/http.log 2>&1 &
          sleep 2
      - run: |
          cat > check.mjs <<'EOF'
          import {chromium} from 'playwright';import fs from 'node:fs';
          const b=await chromium.launch({headless:true});const errors=[];const checks={};
          async function inspect(name,width,height){const p=await b.newPage({viewport:{width,height}});p.on('pageerror',x=>errors.push(`${name}: ${x.message}`));await p.goto('http://127.0.0.1:8000/career-roadmap/index.html');await p.waitForTimeout(2300);const out={title:(await p.title()).includes('V4.8'),page:await p.evaluate(()=>({scroll:document.documentElement.scrollWidth,client:document.documentElement.clientWidth}))};await p.click('[data-view="career"]');out.decision=await p.locator('#decisionRows').innerText();out.headers=await p.locator('#career-decisions thead').innerText();out.states=await p.locator('.gate-state').allTextContents();out.gateOverflow=await p.evaluate(()=>[...document.querySelectorAll('.gate-row')].some(x=>x.scrollWidth>x.clientWidth+1));await p.click('[data-view="resume"]');out.roles=(await p.locator('.portfolio-project header .tag.work').allTextContents()).slice(0,4);out.roleBox=await p.locator('.portfolio-project header .tag.work').first().evaluate(x=>{const s=getComputedStyle(x),r=x.getBoundingClientRect();return{w:r.width,h:r.height,borderRadius:s.borderRadius}});out.projectCols=await p.locator('#projectGrid').evaluate(x=>getComputedStyle(x).gridTemplateColumns);out.projectOverflow=await p.evaluate(()=>[...document.querySelectorAll('.portfolio-project')].some(x=>x.scrollWidth>x.clientWidth+1));out.number=await p.locator('.portfolio-project .project-number').first().evaluate(x=>{const s=getComputedStyle(x);return{display:s.display,border:s.borderStyle,borderRadius:s.borderRadius}});out.crg=await p.locator('.portfolio-project').filter({hasText:'时钟复位模块'}).first().innerText();out.candidates=await p.evaluate(()=>Object.fromEntries(S.abilityCandidates.filter(x=>['soc','verification','debug','productivity','ownership','industry'].includes(x.id)).map(x=>[x.id,x.candidateLevel])));await p.close();checks[name]=out}
          await inspect('desktop',1440,1000);await inspect('narrow',1024,900);await inspect('mobile',390,844);await b.close();const d=checks.desktop,n=checks.narrow,m=checks.mobile;const old=['连续两年责任范围没有实质扩大','只承担执行，没有决策和协调机会','责任持续扩大但回报长期不匹配'];
          const passed=!errors.length&&d.title&&d.headers.includes('当前积极信号')&&old.every(x=>!d.decision.includes(x))&&d.decision.includes('入职早期')&&d.states.join('|')==='进行中|开始出现|待确认|进行中|开始出现'&&d.roles.join('|')==='模块验证工程师|模块验证与环境适配|模块验证与方法接入|验证规划与估算参与'&&d.roleBox.w<190&&d.roleBox.h<50&&d.number.border==='none'&&d.crg.includes('2026.07—至今')&&JSON.stringify(d.candidates)===JSON.stringify({soc:2,verification:3,debug:3,productivity:2,ownership:3,industry:1})&&[d,n,m].every(x=>!x.gateOverflow&&!x.projectOverflow&&x.page.scroll<=x.page.client+1)&&n.projectCols.split(' ').length===1&&m.projectCols.split(' ').length===1&&m.number.display==='none';
          const result={passed,checks,errors};fs.writeFileSync('/tmp/v48-result.json',JSON.stringify(result,null,2));console.log(JSON.stringify(result,null,2));if(!passed)process.exitCode=1;
          EOF
          node check.mjs
      - if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### V4.8 focused diagnostic'; echo '```json'; cat /tmp/v48-result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - run: node -e "const r=require('/tmp/v48-result.json');if(!r.passed)process.exit(1)"
