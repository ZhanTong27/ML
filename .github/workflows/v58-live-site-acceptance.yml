name: Career OS V5.8 Live Site Acceptance

on:
  pull_request:
    paths:
      - '.github/workflows/v58-live-site-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-v58:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit

      - name: Verify the real public website
        run: |
          cat > live-v58.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const site='https://zhantong27.github.io/ML/';
          const result={site,passed:false,runs:[]};

          async function inspect(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const run={name,errors:[]};
            page.on('pageerror',e=>run.errors.push(e.message));
            page.on('console',m=>{if(m.type()==='error')run.errors.push(m.text())});
            try{
              const response=await page.goto(`${site}?accept_v58=${Date.now()}`,{waitUntil:'load',timeout:45000});
              run.httpStatus=response?.status()||0;
              run.contentType=response?.headers()?.['content-type']||'';
              await page.waitForFunction(()=>window.CAREER_OS_V58?.complete===true,null,{timeout:30000});
              await page.waitForTimeout(2600);
              await page.evaluate(()=>{
                const key='zhantong-career-os-v5';
                localStorage.removeItem('zhantong-career-os-v5-pre-v58-backup');
                localStorage.removeItem('zhantong-career-os-v5-pre-v58-manifest');
                S.v58LiveSentinel='preserve-live-v58-data';
                S.selectedDate='2026-07-16';
                S.calendarMonth='2026-07';
                S.dailyLogs=[
                  {date:'2026-07-13',work:[]},
                  {date:'2026-07-14',workItems:[]},
                  {date:'2026-07-15',work:[]},
                  {date:'2026-07-16',work:[]}
                ];
                S.growthHubV58=S.growthHubV58||{};
                S.growthHubV58.activeView='week';
                localStorage.setItem(key,JSON.stringify(S));
              });
              await page.waitForTimeout(150);
              run.errors=[];
              await page.reload({waitUntil:'load',timeout:45000});
              await page.waitForFunction(()=>window.CAREER_OS_V58?.complete===true,null,{timeout:30000});
              await page.waitForTimeout(3200);
              await page.click('[data-view="growth"]');
              await page.waitForTimeout(700);
              run.check=await page.evaluate(()=>{
                const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                const byDate=d=>S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d);
                const legacyIds=['current-execution','problem-journal','weekly-review','ability-map','cycle-archive','uvmms-adoption-v57'];
                const backup=localStorage.getItem('zhantong-career-os-v5-pre-v58-backup')||'';
                return {
                  title:document.title,
                  version:S.version,
                  counts:['2026-07-13','2026-07-14','2026-07-15','2026-07-16'].map(d=>work(byDate(d)).length),
                  selectedDate:S.selectedDate,
                  todayStatus:document.querySelector('#todayRecordStatus')?.textContent?.trim()||'',
                  historyDates:[...document.querySelectorAll('[data-history-date]')].map(x=>x.dataset.historyDate),
                  nav:[...document.querySelectorAll('#growth-nav-v58 [data-v58-nav]')].map(x=>x.textContent.trim()),
                  actions:document.querySelectorAll('[data-v58-action]').length,
                  groups:document.querySelectorAll('[data-v58-action-group]').length,
                  materials:document.querySelectorAll('.action-materials-v58>article').length,
                  prompts:document.querySelectorAll('.action-prompt-v58').length,
                  selfChecks:document.querySelectorAll('[data-v58-selfcheck]').length,
                  signals:document.querySelectorAll('.signal-grid-v58>article').length,
                  abilities:document.querySelectorAll('.ability-cards-v58>article').length,
                  compactToday:Boolean(document.querySelector('#uvmmsTodayV57 .v58-topic-line')),
                  compactPortfolio:Boolean(document.querySelector('#uvmmsPortfolioV57 .v58-topic-line')),
                  legacySafe:legacyIds.every(id=>{const n=document.getElementById(id);return Boolean(n)&&!document.getElementById('growth-hub-v58')?.contains(n)}),
                  backupHasSentinel:backup.includes('preserve-live-v58-data'),
                  overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth
                };
              });
              const x=run.check;
              run.passed=run.httpStatus===200&&run.contentType.includes('text/html')&&run.errors.length===0&&x.title.includes('V5.8')&&String(x.version).startsWith('5.8')&&x.counts.join('/')==='3/4/4/5'&&x.selectedDate==='2026-07-16'&&x.todayStatus==='已记录'&&['2026-07-13','2026-07-14','2026-07-15','2026-07-16'].every(d=>x.historyDates.includes(d))&&x.nav.join('|')==='本周成长|学习专题|能力与证据|复盘档案'&&x.actions===10&&x.groups===4&&x.materials>=20&&x.prompts===10&&x.selfChecks>=40&&x.signals===3&&x.abilities===5&&x.compactToday&&x.compactPortfolio&&x.legacySafe&&x.backupHasSentinel&&x.overflow<=1;
            }catch(e){run.errors.push(e?.stack||String(e));run.passed=false}
            result.runs.push(run);
            await browser.close();
          }

          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/v58-live-acceptance.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          if(!result.passed)process.exit(1);
          EOF
          node live-v58.mjs

      - name: Upload live acceptance result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v58-live-site-acceptance
          path: /tmp/v58-live-acceptance.json
