name: V5.5 Mobile Final Check

on:
  pull_request:
    paths:
      - '.github/workflows/v55-mobile-final-check.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8000 --directory . >/tmp/http.log 2>&1 &
          sleep 2
      - name: Check mobile library
        run: |
          cat > check.mjs <<'EOF'
          import {chromium} from 'playwright';import fs from 'node:fs';
          const browser=await chromium.launch({headless:true});const p=await browser.newPage({viewport:{width:390,height:844}});const errors=[];p.on('pageerror',e=>errors.push(e.message));
          await p.goto('http://127.0.0.1:8000/career-roadmap/index.html');await p.waitForTimeout(2600);await p.evaluate(()=>{switchView('growth');document.getElementById('growth-library-v50').open=true;renderAll()});await p.waitForTimeout(150);
          const result=await p.evaluate(()=>{const root=document.documentElement,b=document.getElementById('frontierBodyV50');return{pass:root.scrollWidth<=root.clientWidth&&!!b?.getClientRects().length&&b.textContent.includes('AMS Verification Frontier Track')&&S.version==='5.5',scrollWidth:root.scrollWidth,clientWidth:root.clientWidth,frontierVisible:!!b?.getClientRects().length,version:S.version,errors:[]}});result.errors=errors;result.pass=result.pass&&!errors.length;fs.writeFileSync('/tmp/result.json',JSON.stringify(result,null,2));await browser.close();
          EOF
          node check.mjs
      - name: Comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### V5.5 mobile final check'; echo '```json'; cat /tmp/result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce
        run: node -e "const x=require('/tmp/result.json');if(!x.pass)process.exit(1)"
