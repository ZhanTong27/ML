name: Career OS V5.9.7 Weekly Range Contract Upgrade

on:
  pull_request:
    branches:
      - main
    paths:
      - career-roadmap/tools/v597-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply upgrade and capture diagnostics
        shell: bash
        run: |
          set +e
          rm -f career-roadmap/tools/v597-last-error.log career-roadmap/tools/v597-status.txt
          if grep -q CAREER_OS_V597_WEEKLY_RANGE_CONTRACT career-roadmap/build_single_file.py; then
            echo "V5.9.7 already applied" > career-roadmap/tools/v597-last-error.log
            status=0
          else
            sed -i 's/{".js", ".html", ".py"}/{".js", ".html"}/' career-roadmap/tools/v597_upgrade.py
            python3 career-roadmap/tools/v597_upgrade.py > career-roadmap/tools/v597-last-error.log 2>&1
            status=$?
          fi
          echo "$status" > career-roadmap/tools/v597-status.txt
          if [ "$status" -ne 0 ]; then
            git restore career-roadmap/app.js career-roadmap/index.template.html career-roadmap/build_single_file.py career-roadmap/curriculum/v40-reviews.js .github/workflows/v59-live-artifact-acceptance.yml 2>/dev/null || true
            rm -f career-roadmap/curriculum/v597-weekly-range-contract.js
          fi
          exit 0
      - name: Build and validate when upgrade succeeded
        shell: bash
        run: |
          status=$(cat career-roadmap/tools/v597-status.txt)
          if [ "$status" -eq 0 ]; then
            python3 career-roadmap/build_single_file.py
            node --check career-roadmap/app.js
            node --check career-roadmap/curriculum/v40-reviews.js
            node --check career-roadmap/curriculum/v597-weekly-range-contract.js
            grep -q CAREER_OS_V597_WEEKLY_RANGE_CONTRACT career-roadmap/index.html
          fi
      - name: Commit result or diagnostic to PR branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          status=$(cat career-roadmap/tools/v597-status.txt)
          if [ "$status" -eq 0 ]; then
            git add career-roadmap/app.js career-roadmap/index.template.html career-roadmap/index.html career-roadmap/latest.html career-roadmap/build_single_file.py career-roadmap/curriculum/v40-reviews.js career-roadmap/curriculum/v597-weekly-range-contract.js .github/workflows/v59-live-artifact-acceptance.yml career-roadmap/tools/v597-last-error.log career-roadmap/tools/v597-status.txt
            message="Upgrade weekly review range contract to V5.9.7"
          else
            git add career-roadmap/tools/v597-last-error.log career-roadmap/tools/v597-status.txt
            message="Record V5.9.7 upgrade diagnostic"
          fi
          if ! git diff --cached --quiet; then
            git commit -m "$message"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Fail after diagnostic is persisted
        shell: bash
        run: |
          status=$(cat career-roadmap/tools/v597-status.txt)
          if [ "$status" -ne 0 ]; then
            cat career-roadmap/tools/v597-last-error.log
            exit "$status"
          fi
