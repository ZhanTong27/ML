name: Verify Career OS Public Site

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/verify-career-os-public.yml'
      - '.github/workflows/deploy-career-os-pages.yml'
      - 'career-roadmap/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Inspect GitHub Pages state and public URLs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          mkdir -p /tmp/career-pages

          pages_code=$(curl -sS -L --connect-timeout 15 --max-time 45 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o /tmp/career-pages/pages-api.json \
            -w '%{http_code}' \
            "https://api.github.com/repos/$REPO/pages")
          export PAGES_CODE="${pages_code:-0}"

          check_url(){
            name="$1"; url="$2"
            code=$(curl -sS -L --retry 5 --retry-delay 8 --retry-all-errors \
              --connect-timeout 15 --max-time 60 \
              -o "/tmp/career-pages/${name}.html" \
              -w '%{http_code}' "$url")
            code=${code:-0}
            ctype=$(curl -sS -L -I --connect-timeout 15 --max-time 45 "$url" 2>/dev/null | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{v=$2} END{print v}')
            title=$(grep -oi '<title>[^<]*</title>' "/tmp/career-pages/${name}.html" 2>/dev/null | head -1 | sed -E 's#</?title>##Ig')
            bytes=$(wc -c <"/tmp/career-pages/${name}.html" 2>/dev/null || echo 0)
            marker_v57=false; grep -q 'CAREER_OS_V57' "/tmp/career-pages/${name}.html" 2>/dev/null && marker_v57=true
            marker_0716=false; grep -q '2026-07-16-ms7q' "/tmp/career-pages/${name}.html" 2>/dev/null && marker_0716=true
            wrapper_v57=false; grep -q 'raw.githubusercontent.com/ZhanTong27/ML/main/career-roadmap/index.html' "/tmp/career-pages/${name}.html" 2>/dev/null && wrapper_v57=true
            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' "$name" "$url" "$code" "$ctype" "$bytes" "$marker_v57" "$marker_0716" "$wrapper_v57" >> /tmp/career-pages/url-results.tsv
            printf '%s\t%s\n' "$name" "$title" >> /tmp/career-pages/titles.tsv
          }

          check_url ml_pages 'https://zhantong27.github.io/ML/'
          check_url slideshow_root 'https://zhantong27.github.io/github-slideshow/'
          check_url slideshow_career 'https://zhantong27.github.io/github-slideshow/career-os/'

          python3 - <<'PY'
          import json, os, pathlib
          root=pathlib.Path('/tmp/career-pages')
          try:
              api=json.loads((root/'pages-api.json').read_text())
          except Exception:
              api={'raw':(root/'pages-api.json').read_text(errors='replace') if (root/'pages-api.json').exists() else ''}
          titles={}
          if (root/'titles.tsv').exists():
              for line in (root/'titles.tsv').read_text().splitlines():
                  k,_,v=line.partition('\t');titles[k]=v
          rows=[]
          if (root/'url-results.tsv').exists():
              for line in (root/'url-results.tsv').read_text().splitlines():
                  parts=line.split('\t')
                  if len(parts)!=8:
                      continue
                  name,url,code,ctype,bytes_,v57,m0716,wrapper=parts
                  rows.append({
                      'name':name,'url':url,'httpStatus':int(code or 0),
                      'contentType':ctype,'bytes':int(bytes_ or 0),
                      'title':titles.get(name,''),'markerV57':v57=='true',
                      'marker0716':m0716=='true','wrapperV57':wrapper=='true'
                  })
          result={
              'pagesApiStatus':int(os.environ.get('PAGES_CODE','0') or 0),
              'pagesApi':api,
              'urls':rows
          }
          result['verifiedUrl']=next((r['url'] for r in rows if r['httpStatus']==200 and r['markerV57'] and r['marker0716']),None)
          result['candidateWrapperUrl']=next((r['url'] for r in rows if r['httpStatus']==200 and r['wrapperV57']),None)
          (root/'result.json').write_text(json.dumps(result,ensure_ascii=False,indent=2))
          print(json.dumps(result,ensure_ascii=False,indent=2))
          PY

      - name: Post result to verification issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/career-pages
          if [ ! -f /tmp/career-pages/result.json ]; then
            printf '{"error":"verification result was not generated"}\n' >/tmp/career-pages/result.json
          fi
          {
            echo '### Public-site verification run'
            echo
            echo 'Commit: `${{ github.sha }}`'
            echo '```json'
            cat /tmp/career-pages/result.json
            echo '```'
          } >/tmp/career-pages/comment.md
          gh issue comment 53 --repo "${{ github.repository }}" --body-file /tmp/career-pages/comment.md

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-os-public-verification
          path: /tmp/career-pages
