name: Bundle Career OS Single File

on:
  push:
    branches: [main]
    paths:
      - 'career-roadmap/index.template.html'
      - 'career-roadmap/style.css'
      - 'career-roadmap/legacy-data-v22.js'
      - 'career-roadmap/app.js'
      - 'career-roadmap/curriculum/**'
      - '.github/workflows/bundle-career-os.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: career-os-bundle
  cancel-in-progress: true

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate self-contained index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          root=Path('career-roadmap')
          html=(root/'index.template.html').read_text(encoding='utf-8')
          css=(root/'style.css').read_text(encoding='utf-8')
          marker='<link rel="stylesheet" href="style.css">'
          if marker not in html: raise SystemExit('Template stylesheet marker not found')
          html=html.replace(marker,'<style>\n'+css+'\n</style>',1)
          sources=['legacy-data-v22.js','curriculum/base.js','curriculum/cycle1.js','curriculum/cycle2.js','curriculum/cycle3.js','curriculum/cycle4.js','app.js','curriculum/patch.js','curriculum/finalize.js']
          markers='\n'.join(f'<script src="{src}"></script>' for src in sources)
          if markers not in html: raise SystemExit('Template script marker sequence not found')
          blocks=[]
          for src in sources:
              code=(root/src).read_text(encoding='utf-8')
              code=re.sub(r'</script',r'<\\/script',code,flags=re.I)
              blocks.append(f'<script data-source="{src}">\n{code}\n</script>')
          html=html.replace(markers,'\n'.join(blocks),1)
          extras=['curriculum/manual-v31.js','curriculum/v32.js','curriculum/resume-v33.js','curriculum/resume-portfolio-v34.js','curriculum/daily-20260713.js','curriculum/v40-career-model.js','curriculum/v40-reviews.js','curriculum/v41-explorer.js','curriculum/v42-demo.js']
          extra=[]
          for src in extras:
              code=(root/src).read_text(encoding='utf-8')
              code=re.sub(r'</script',r'<\\/script',code,flags=re.I)
              extra.append(f'<script data-source="{src}">\n{code}\n</script>')
          html=html.replace('</body>','\n'.join(extra)+'\n</body>',1)
          if re.search(r'<script\s+[^>]*src=',html,re.I): raise SystemExit('External script remains')
          required=['ENGINEERING PORTFOLIO','Recruiter View','2026-07-13-a7f3','DIAGNOSIS LIFECYCLE','career-os-v4-weekly-1','career-os-v4-monthly-1','REVIEW ARCHIVE','evidenceControlsV41','5分钟看懂 Career OS','openUsageDemo']
          missing=[x for x in required if x not in html]
          if missing: raise SystemExit(f'Missing bundled markers: {missing}')
          (root/'index.html').write_text(html,encoding='utf-8')
          PY
      - name: Validate bundled HTML structure
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          text=Path('career-roadmap/index.html').read_text(encoding='utf-8')
          assert not re.search(r'<script\s+[^>]*src=',text,re.I)
          assert '2026-07-13-a7f3' in text
          assert 'DIAGNOSIS LIFECYCLE' in text
          assert 'career-os-v4-weekly-1' in text
          assert 'career-os-v4-monthly-1' in text
          assert 'REVIEW ARCHIVE' in text
          assert 'evidenceControlsV41' in text
          assert 'ENGINEERING PORTFOLIO' in text
          assert '5分钟看懂 Career OS' in text
          assert 'openUsageDemo' in text
          print('Single-file structure validated')
          PY
      - name: Commit generated page
        run: |
          if git diff --quiet -- career-roadmap/index.html; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add career-roadmap/index.html
          git commit -m 'Bundle Career OS into single-file page'
          git push origin HEAD:main
