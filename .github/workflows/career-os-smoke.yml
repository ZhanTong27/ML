name: Career OS Smoke Test

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/career-os-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Chromium test runtime
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start local site
        run: |
          python3 -m http.server 8000 --directory . >/tmp/career-http.log 2>&1 &
          sleep 2
      - name: Render site in Chromium
        run: |
          cat > /tmp/smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const errors = [];
          const checks = {};
          let browser;
          try {
            browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 1440, height: 1000 } });
            page.on('pageerror', error => errors.push(`pageerror: ${error.message}`));
            page.on('console', msg => { if (msg.type() === 'error') errors.push(`console: ${msg.text()}`); });
            page.on('requestfailed', req => errors.push(`requestfailed: ${req.url()} ${req.failure()?.errorText || ''}`));
            await page.goto('http://127.0.0.1:8000/career-roadmap/index.html', { waitUntil: 'networkidle', timeout: 60000 });
            await page.waitForTimeout(1500);
            Object.assign(checks, await page.evaluate(() => ({
              title: document.title.includes('Career OS V2.3'),
              today: document.querySelector('#todayStatusRow')?.children.length === 3,
              actions: document.querySelector('#todayActionList')?.children.length > 0,
              weeks: document.querySelectorAll('#weekTabs button').length === 16,
              cycles: document.querySelectorAll('#curriculumMap .curriculum-cycle').length === 4,
              curriculum: document.documentElement.dataset.curriculum === 'soc-verification-16w-v1',
              abilities: document.querySelectorAll('#abilityGrid .ability').length === 7,
              views: document.querySelectorAll('.nav button').length === 4,
              quickModal: Boolean(document.querySelector('#quickModal')),
              toolsModal: Boolean(document.querySelector('#toolsModal')),
              bodyVisible: document.body.getBoundingClientRect().height > 500
            })));
            await page.click('[data-view="growth"]');
            await page.waitForTimeout(300);
            checks.growthVisible = await page.locator('#growth').evaluate(el => getComputedStyle(el).display !== 'none');
            await page.click('#openQuick');
            checks.quickOpen = await page.locator('#quickModal').evaluate(el => el.classList.contains('open'));
            await page.keyboard.press('Escape');
            await page.click('#openTools');
            checks.toolsOpen = await page.locator('#toolsModal').evaluate(el => el.classList.contains('open'));
            await page.screenshot({ path: '/tmp/career-os-home.png', fullPage: true });
          } catch (error) {
            errors.push(error?.stack || String(error));
          } finally {
            await browser?.close();
          }
          fs.writeFileSync('/tmp/smoke-result.json', JSON.stringify({ checks, errors }, null, 2));
          console.log(JSON.stringify({ checks, errors }));
          EOF
          node /tmp/smoke.mjs
      - name: Check script and network errors
        run: node -e "const r=require('/tmp/smoke-result.json'); if(r.errors.length){console.error(r.errors.join('\n'));process.exit(1)}"
      - name: Check page title
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.title)process.exit(1)"
      - name: Check today status
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.today)process.exit(1)"
      - name: Check today actions
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.actions)process.exit(1)"
      - name: Check 16 weeks
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.weeks)process.exit(1)"
      - name: Check 4 cycles
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.cycles)process.exit(1)"
      - name: Check curriculum marker
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.curriculum)process.exit(1)"
      - name: Check 7 abilities
        if: always()
        run: node -e "if(!require('/tmp/smoke-result.json').checks.abilities)process.exit(1)"
      - name: Check navigation and visibility
        if: always()
        run: node -e "const c=require('/tmp/smoke-result.json').checks; if(!(c.views&&c.bodyVisible&&c.growthVisible))process.exit(1)"
      - name: Check quick modal
        if: always()
        run: node -e "const c=require('/tmp/smoke-result.json').checks; if(!(c.quickModal&&c.quickOpen))process.exit(1)"
      - name: Check tools modal
        if: always()
        run: node -e "const c=require('/tmp/smoke-result.json').checks; if(!(c.toolsModal&&c.toolsOpen))process.exit(1)"
