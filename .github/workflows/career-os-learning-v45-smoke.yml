name: Career OS Learning V4.5 Smoke

on:
  pull_request:
    paths:
      - '.github/workflows/career-os-learning-v45-smoke.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  learning:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
      - run: |
          python3 -m http.server 8000 --directory . >/tmp/career-http.log 2>&1 &
          sleep 2
      - name: Validate personalized learning and profile
        run: |
          cat > learning-smoke.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs';
          const errors=[];const checks={};let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1000}});
            page.setDefaultTimeout(8000);
            page.on('pageerror',e=>errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')errors.push(`console: ${m.text()}`)});
            const response=await page.goto('http://127.0.0.1:8000/career-roadmap/index.html',{waitUntil:'domcontentloaded'});
            checks.httpStatus=response?.status()||0;await page.waitForTimeout(2800);
            Object.assign(checks,await page.evaluate(()=>{
              const tasks=window.CURRICULUM_WEEKS.flatMap(w=>w.tasks||[]);
              return {
                title:document.title.includes('Career OS V4.5'),
                curriculum:document.documentElement.dataset.curriculum,
                curriculumState:S.curriculumVersion,
                weeks:window.CURRICULUM_WEEKS.length,
                tasks:tasks.length,
                uniqueTasks:new Set(tasks.map(x=>x.id)).size,
                fourEach:window.CURRICULUM_WEEKS.every(w=>w.tasks.length===4),
                cycles:window.CURRICULUM_CYCLES.map(x=>x.title),
                currentWeek:currentWeek().title,
                abilities:S.abilities.map(x=>({id:x.id,level:x.level,status:x.status})),
                formalConfidenceUntouched:S.careerModel.filter(x=>['diag-sim-timing-debug','diag-ate-interface-knowledge','diag-lowpower-intent-judgment'].includes(x.diagnosisId)).every(x=>Number(x.diagnosisConfidence)===0),
                dailyPatch:S.patchHistory.some(x=>x.patchId==='2026-07-13-a7f3'),
                facts:S.facts.filter(x=>x.patchId==='2026-07-13-a7f3').length,
                evidence:S.evidence.filter(x=>x.patchId==='2026-07-13-a7f3').length,
                finance:Boolean(S.resources?.snapshot),
                portfolioProjects:S.resume?.projects?.length||0
              }
            }));
            await page.click('[data-view="growth"]');await page.waitForTimeout(200);
            checks.analysisSection=await page.locator('#personal-analysis-v45').count();
            checks.stageCards=await page.locator('.profile-stage-v45 article').count();
            checks.profileColumns=await page.locator('.profile-grid-v45 article').count();
            const analysisText=await page.locator('#personal-analysis-v45').innerText();
            checks.analysisContent=analysisText.includes('独立IP Owner候选')&&analysisText.includes('量化Closure')&&analysisText.includes('Power-state')&&analysisText.includes('工作影响课程，但不统治课程');
            checks.weekTabs=await page.locator('#weekTabs button').count();
            checks.cycleCards=await page.locator('#curriculumMap .curriculum-cycle').count();
            checks.currentTasks=await page.locator('#weekContent .task').count();
            const weekText=await page.locator('#weekContent').innerText();
            checks.weekContent=weekText.includes('风险驱动验证闭环图')&&weekText.includes('量化Closure台账')&&weekText.includes('AI口试：IP Owner基线');
            checks.workSeparated=weekText.includes('真实工作只提供诊断与迁移机会');
            await page.click('[data-view="resume"]');checks.portfolio=await page.locator('.portfolio-hero').count();checks.djiAssets=await page.locator('#dji-assets-v43').count();
            await page.click('[data-view="career"]');checks.financeHero=await page.locator('.finance-hero-v44').count();
          }catch(e){errors.push(e?.stack||String(e))}finally{await browser?.close()}
          const abilityMap=Object.fromEntries((checks.abilities||[]).map(x=>[x.id,x]));
          const passed=errors.length===0&&checks.httpStatus===200&&checks.title&&checks.curriculum==='soc-verification-16w-v2-personalized'&&checks.curriculumState==='soc-verification-16w-v2-personalized'&&checks.weeks===16&&checks.tasks===64&&checks.uniqueTasks===64&&checks.fourEach&&checks.cycles.length===4&&checks.cycles[0].includes('IP Owner')&&checks.cycles[2].includes('Clock / Reset / Power')&&checks.currentWeek==='验证闭环与Owner基线'&&checks.analysisSection===1&&checks.stageCards===3&&checks.profileColumns===3&&checks.analysisContent&&checks.weekTabs===16&&checks.cycleCards===4&&checks.currentTasks===4&&checks.weekContent&&checks.workSeparated&&abilityMap.verification?.level>=4&&abilityMap.debug?.level>=4&&abilityMap.soc?.level>=3&&abilityMap.lowpower?.level>=2&&checks.formalConfidenceUntouched&&checks.dailyPatch&&checks.facts===14&&checks.evidence===6&&checks.finance&&checks.portfolioProjects>=7&&checks.portfolio===1&&checks.djiAssets===1&&checks.financeHero===1;
          const result={passed,checks,errors};fs.writeFileSync('/tmp/learning-result.json',JSON.stringify(result,null,2));console.log(JSON.stringify(result,null,2));
          EOF
          node learning-smoke.mjs
      - name: Publish diagnostic
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          { echo '### Career OS V4.5 personalized learning diagnostic'; echo '```json'; cat /tmp/learning-result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce test
        run: node -e "const r=require('/tmp/learning-result.json'); if(!r.passed)process.exit(1)"
