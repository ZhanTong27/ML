name: Career OS V5.8 Human Growth Smoke

on:
  pull_request:
    paths:
      - 'career-roadmap/**'
      - '.github/workflows/v58-human-growth-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  human-growth:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - name: Build V5.8 single-file page
        run: python3 career-roadmap/build_single_file.py --output index.v58-test.html
      - name: Install browser runtimes
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium webkit
      - name: Run desktop and iPhone checks
        continue-on-error: true
        run: |
          python3 -m http.server 8000 --directory . >/tmp/v58-http.log 2>&1 &
          cat > v58-growth-smoke.mjs <<'EOF'
          import { chromium, webkit, devices } from 'playwright';
          import fs from 'node:fs';
          const url='http://127.0.0.1:8000/career-roadmap/index.v58-test.html';
          const result={passed:false,runs:[]};
          async function inspect(browserType,name,options){
            const browser=await browserType.launch({headless:true});
            const context=await browser.newContext(options);
            const page=await context.newPage();
            const run={name,errors:[]};
            page.on('pageerror',e=>run.errors.push(`pageerror: ${e.message}`));
            page.on('console',m=>{if(m.type()==='error')run.errors.push(`console: ${m.text()}`)});
            try{
              await page.goto(url,{waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V58?.complete===true,null,{timeout:30000});
              await page.evaluate(()=>{
                const key='zhantong-career-os-v5';
                const state=JSON.parse(localStorage.getItem(key));
                state.v58SafetySentinel='preserve-old-data';
                state.selectedDate='2026-07-16';
                state.calendarMonth='2026-07';
                state.uvmmsProgramV57=state.uvmmsProgramV57||{};
                state.uvmmsProgramV57.note='keep-v57-note';
                localStorage.removeItem('zhantong-career-os-v5-pre-v58-backup');
                localStorage.removeItem('zhantong-career-os-v5-pre-v58-manifest');
                localStorage.setItem(key,JSON.stringify(state));
              });
              run.errors=[];
              await page.reload({waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V58?.complete===true,null,{timeout:30000});
              await page.waitForTimeout(2800);
              await page.click('[data-view="growth"]');
              await page.waitForTimeout(800);
              run.fresh=await page.evaluate(()=>{
                const work=x=>Array.isArray(x?.work)&&x.work.length?x.work:Array.isArray(x?.workItems)&&x.workItems.length?x.workItems:Array.isArray(x?.dailyRecord?.workItems)?x.dailyRecord.workItems:[];
                const byDate=d=>S.dailyLogs.find(x=>(x.date||x.dailyRecord?.date)===d);
                const backup=localStorage.getItem('zhantong-career-os-v5-pre-v58-backup')||'';
                const ids=['current-execution','problem-journal','weekly-review','ability-map','cycle-archive','uvmms-adoption-v57'];
                return {
                  title:document.title,version:S.version,
                  counts:{'2026-07-13':work(byDate('2026-07-13')).length,'2026-07-14':work(byDate('2026-07-14')).length,'2026-07-15':work(byDate('2026-07-15')).length,'2026-07-16':work(byDate('2026-07-16')).length},
                  nav:[...document.querySelectorAll('#growth-nav-v58 [data-v58-nav]')].map(x=>x.textContent.trim()),
                  actionCount:document.querySelectorAll('[data-v58-action]').length,
                  actionGroups:document.querySelectorAll('[data-v58-action-group]').length,
                  materialCount:document.querySelectorAll('.action-materials-v58>article').length,
                  promptCount:document.querySelectorAll('.action-prompt-v58').length,
                  selfCheckCount:document.querySelectorAll('[data-v58-selfcheck]').length,
                  signalVisible:document.querySelectorAll('.signal-grid-v58>article').length,
                  abilityCount:document.querySelectorAll('.ability-cards-v58>article').length,
                  scaleCount:document.querySelectorAll('.ability-scale-line-v58>div').length,
                  oldSections:Object.fromEntries(ids.map(id=>[id,{exists:Boolean(document.getElementById(id)),insideHub:Boolean(document.getElementById('growth-hub-v58')?.contains(document.getElementById(id))),hidden:Boolean(document.getElementById(id)?.closest('.content-section')?.hidden)}])),
                  backupPresent:Boolean(backup),backupHasSentinel:backup.includes('preserve-old-data'),v57Note:S.uvmmsProgramV57?.note||'',
                  todayCompact:Boolean(document.querySelector('#uvmmsTodayV57 .v58-topic-line')),
                  portfolioCompact:Boolean(document.querySelector('#uvmmsPortfolioV57 .v58-topic-line')),
                  overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth
                }
              });
              const action=page.locator('[data-v58-action="main-model-contract"]');
              await action.evaluate(el=>el.open=true);
              await page.check('[data-v58-select="main-model-contract"]');
              await page.locator('[data-v58-action="main-model-contract"]').evaluate(el=>el.open=true);
              await page.check('[data-v58-selfcheck="main-model-contract"][data-v58-check-index="0"]');
              await page.locator('[data-v58-action="main-model-contract"]').evaluate(el=>el.open=true);
              await page.fill('[data-v58-action-note="main-model-contract"]','v58-note-persist');
              await page.locator('[data-v58-action-note="main-model-contract"]').evaluate(el=>el.dispatchEvent(new Event('change',{bubbles:true})));
              await page.reload({waitUntil:'load'});
              await page.waitForFunction(()=>window.CAREER_OS_V58?.complete===true,null,{timeout:30000});
              await page.waitForTimeout(2200);
              run.persisted=await page.evaluate(()=>({selected:S.growthHubV58.selectedActions['main-model-contract'],checked:S.growthHubV58.selfChecks['main-model-contract'][0],note:S.growthHubV58.actionNotes['main-model-contract'],backupStillHasSentinel:(localStorage.getItem('zhantong-career-os-v5-pre-v58-backup')||'').includes('preserve-old-data'),v57Note:S.uvmmsProgramV57?.note||'',legacyCount:['current-execution','problem-journal','weekly-review','ability-map','cycle-archive','uvmms-adoption-v57'].filter(id=>document.getElementById(id)).length,overflow:document.documentElement.scrollWidth-document.documentElement.clientWidth}));
              const f=run.fresh,p=run.persisted,c=f.counts;
              const legacySafe=Object.values(f.oldSections).every(x=>x.exists&&!x.insideHub&&x.hidden);
              run.passed=run.errors.length===0&&f.title.includes('V5.8')&&String(f.version).startsWith('5.8')&&c['2026-07-13']===3&&c['2026-07-14']===4&&c['2026-07-15']===4&&c['2026-07-16']===5&&f.nav.join('|')==='本周成长|学习专题|能力与证据|复盘档案'&&f.actionCount===10&&f.actionGroups===4&&f.materialCount>=20&&f.promptCount===10&&f.selfCheckCount>=40&&f.signalVisible===3&&f.abilityCount===5&&f.scaleCount>=6&&legacySafe&&f.backupPresent&&f.backupHasSentinel&&f.v57Note==='keep-v57-note'&&f.todayCompact&&f.portfolioCompact&&f.overflow<=1&&p.selected&&p.checked&&p.note==='v58-note-persist'&&p.backupStillHasSentinel&&p.v57Note==='keep-v57-note'&&p.legacyCount===6&&p.overflow<=1;
            }catch(e){run.errors.push(e?.stack||String(e));run.passed=false}
            result.runs.push(run);await browser.close()
          }
          await inspect(chromium,'chromium-desktop',{viewport:{width:1440,height:1000},locale:'zh-CN'});
          await inspect(webkit,'webkit-iphone',{...devices['iPhone 15 Pro'],locale:'zh-CN'});
          result.passed=result.runs.every(x=>x.passed);
          fs.writeFileSync('/tmp/v58-growth-result.json',JSON.stringify(result,null,2));
          console.log(JSON.stringify(result,null,2));
          EOF
          node v58-growth-smoke.mjs
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v58-human-growth-result
          path: /tmp/v58-growth-result.json
      - name: Comment PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/v58-growth-result.json ]; then printf '{"passed":false,"error":"result missing"}\n' >/tmp/v58-growth-result.json; fi
          { echo '### Career OS V5.8 human-centered Growth'; echo '```json'; cat /tmp/v58-growth-result.json; echo '```'; } >/tmp/v58-growth-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/v58-growth-comment.md
      - name: Enforce checks
        run: node -e "const r=require('/tmp/v58-growth-result.json');if(!r.passed)process.exit(1)"
