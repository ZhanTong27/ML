name: V5.5 AMS Frontier Smoke

on:
  pull_request:
    paths:
      - '.github/workflows/v55-ams-frontier-smoke.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium
          python3 -m http.server 8000 --directory . >/tmp/http.log 2>&1 &
          sleep 2
      - name: Validate independent AMS frontier
        run: |
          cat > smoke.mjs <<'EOF'
          import {chromium} from 'playwright';
          import fs from 'node:fs';
          const out={pass:false,r:{},errors:[]};let browser;
          try{
            browser=await chromium.launch({headless:true});
            const page=await browser.newPage({viewport:{width:1440,height:1200}});
            page.on('pageerror',e=>out.errors.push(`pageerror:${e.message}`));
            page.on('console',m=>{if(m.type()==='error')out.errors.push(`console:${m.text()}`)});
            await page.goto('http://127.0.0.1:8000/career-roadmap/index.html');await page.waitForTimeout(3600);
            const r=out.r;
            r.base=await page.evaluate(()=>({title:document.title,version:S.version,daily15:S.learningResponses.filter(x=>x.date==='2026-07-15').map(x=>x.id),oldAms:S.learningResponses.some(x=>['learn-2026-07-15-ams-strategy','learn-2026-07-15-ocldo-prep'].includes(x.id)),frontier:!!window.AMS_FRONTIER_V55,maturity:window.AMS_FRONTIER_V55?.maturity?.length||0,readings:window.AMS_FRONTIER_V55?.readings?.length||0,ocldoPapers:window.AMS_FRONTIER_V55?.ocldo?.papers?.length||0,meta:window.CAREER_OS_V55||null,currentLab:currentFrontierLabV50()}));
            await page.evaluate(()=>switchView('growth'));await page.waitForTimeout(180);
            r.weekly={title:await page.locator('#weekly-command-v50 .frontier-highlight-v50 h3').textContent(),text:await page.locator('#weekly-command-v50 .frontier-highlight-v50').textContent(),button:await page.locator('#openFrontierV50').count()};
            await page.locator('#openFrontierV50').click();await page.waitForTimeout(220);
            r.ui={libraryOpen:await page.locator('#growth-library-v50').evaluate(x=>x.open),section:await page.locator('#frontier-radar-v50').count(),visible:await page.locator('#frontierBodyV50').isVisible(),title:await page.locator('#frontierBodyV50 h2').textContent(),text:await page.locator('#frontierBodyV50').textContent(),maturityCards:await page.locator('.ams-maturity-grid-v55>article').count(),readingCards:await page.locator('.ams-reading-v55').count(),ocldoPapers:await page.locator('.ocldo-paper-list-v55>article').count(),links:await page.locator('#frontierBodyV50 a').count(),chapters:await page.locator('[data-ams-chapter]').count(),readings:await page.locator('[data-ams-reading]').count(),oldLabStatus:await page.locator('#frontierStatusV50').count()};
            await page.locator('details.ams-frontier-details-v55').nth(1).evaluate(x=>x.open=true);
            await page.locator('[data-ams-reading]').first().check({force:true});await page.waitForTimeout(80);
            await page.locator('[data-ams-chapter]').first().check({force:true});await page.waitForTimeout(80);
            await page.locator('#amsFrontierNoteV55').fill('UVM-MS负责统一验证组件和桥接，不替代连续时间求解。');await page.locator('#saveAMSFrontierV55').click();await page.waitForTimeout(120);
            r.saved=await page.evaluate(()=>({reading:Object.values(S.amsFrontierV55.reading).filter(Boolean).length,chapters:Object.values(S.amsFrontierV55.chapters).filter(Boolean).length,note:S.amsFrontierV55.note}));
            await page.reload();await page.waitForTimeout(2900);
            r.reload=await page.evaluate(()=>({title:document.title,version:S.version,daily15:S.learningResponses.filter(x=>x.date==='2026-07-15').map(x=>x.id),oldAms:S.learningResponses.some(x=>['learn-2026-07-15-ams-strategy','learn-2026-07-15-ocldo-prep'].includes(x.id)),reading:Object.values(S.amsFrontierV55.reading).filter(Boolean).length,chapters:Object.values(S.amsFrontierV55.chapters).filter(Boolean).length,note:S.amsFrontierV55.note,currentLab:currentFrontierLabV50() }));
            const mobile=await browser.newPage({viewport:{width:390,height:844}});await mobile.goto('http://127.0.0.1:8000/career-roadmap/index.html');await mobile.waitForTimeout(2500);await mobile.evaluate(()=>switchView('growth'));await mobile.waitForTimeout(100);await mobile.locator('#openFrontierV50').click();await mobile.waitForTimeout(150);r.mobile={overflow:await mobile.evaluate(()=>document.documentElement.scrollWidth>document.documentElement.clientWidth),visible:await mobile.locator('#frontierBodyV50').isVisible()};
            const req=['learn-2026-07-15-waveform-rollover','learn-2026-07-15-clock-switch-bounds','learn-2026-07-15-hierarchical-wave-review'];
            const independent=r.ui.text.includes('从当前任务脱钩')&&r.ui.text.includes('不由当前任务决定学习上限')&&r.ui.text.includes('公开标准')&&r.ui.text.includes('论文')&&r.ui.text.includes('AI');
            const content=r.ui.text.includes('UVM-MS 1.0')&&r.ui.text.includes('SystemVerilog Mixed-Signal Interface Types')&&r.ui.text.includes('连续空间Coverage与智能Corner搜索')&&r.ui.text.includes('Federated Simulation')&&r.ui.text.includes('AnalogTester')&&r.ui.text.includes('Output-Capacitorless LDO')&&r.ui.text.includes('P.K.T. Mok');
            out.pass=!out.errors.length&&r.base.title==='Zhantong · Career OS V5.5'&&r.base.version==='5.5'&&r.base.frontier&&r.base.maturity>=7&&r.base.readings>=10&&r.base.ocldoPapers>=4&&r.base.meta?.frontier==='independent-ams-verification'&&r.base.currentLab?.id==='ams-cognition'&&req.every(x=>r.base.daily15.includes(x))&&r.base.daily15.length===3&&!r.base.oldAms&&r.weekly.title.includes('AMS Verification Frontier Track')&&r.weekly.text.includes('不由当前工作任务决定')&&r.weekly.button===1&&r.ui.libraryOpen&&r.ui.section===1&&r.ui.visible&&r.ui.title.includes('数模混合验证的行业认知')&&independent&&content&&r.ui.maturityCards>=7&&r.ui.readingCards>=10&&r.ui.ocldoPapers>=4&&r.ui.links>=20&&r.ui.chapters===5&&r.ui.readings>=10&&r.ui.oldLabStatus===0&&r.saved.reading===1&&r.saved.chapters===1&&r.saved.note.includes('不替代连续时间求解')&&r.reload.title==='Zhantong · Career OS V5.5'&&r.reload.version==='5.5'&&r.reload.daily15.length===3&&!r.reload.oldAms&&r.reload.currentLab?.id==='ams-cognition'&&r.reload.reading===1&&r.reload.chapters===1&&r.reload.note.includes('不替代连续时间求解')&&!r.mobile.overflow&&r.mobile.visible;
          }catch(e){out.errors.push(`exception:${e.stack||e.message}`)}finally{if(browser)await browser.close().catch(()=>{});fs.writeFileSync('/tmp/result.json',JSON.stringify(out,null,2))}
          EOF
          node smoke.mjs
      - name: Publish result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f /tmp/result.json || echo '{"pass":false,"errors":["result file missing"]}' >/tmp/result.json
          { echo '### V5.5 AMS Frontier smoke'; echo '```json'; cat /tmp/result.json; echo '```'; } >/tmp/comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.md
      - name: Enforce
        run: node -e "const x=require('/tmp/result.json');if(!x.pass)process.exit(1)"
